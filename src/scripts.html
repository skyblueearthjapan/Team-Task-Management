<script>
(function () {
  'use strict';

  // ════════════════════════════════════════════════════════════════
  // A. ユーティリティ
  // ════════════════════════════════════════════════════════════════

  /** HTML エスケープ（XSS 対策） */
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = String(s == null ? '' : s);
    return d.innerHTML;
  }

  /** attribute value 用エスケープ（" と & のみ。innerHTML text 部分は esc() を使う） */
  function escAttr(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  /** 日付を YYYY-MM-DD に変換 */
  function toYMD(d) {
    if (!d) return '';
    if (typeof d === 'string') return d.slice(0, 10);
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  }

  /** YYYY-MM-DD → Date */
  function parseDate(s) {
    if (!s) return null;
    var p = String(s).split('-');
    return new Date(+p[0], +p[1] - 1, +p[2]);
  }

  /** 日本語曜日 */
  var DOW_JA = ['日', '月', '火', '水', '木', '金', '土'];

  /** Toast 通知 */
  function toast(msg, type) {
    var c = document.getElementById('toast-container');
    var el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(function () { el.remove(); }, 3500);
  }

  /** モーダルフォーカストラップ */
  function trapFocus(modal) {
    if (modal._trapHandler) {
      modal.removeEventListener('keydown', modal._trapHandler);
    }
    var focusables = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (!focusables.length) return;
    focusables[0].focus();
    modal._trapHandler = function(e) {
      if (e.key !== 'Tab') return;
      var first = focusables[0];
      var last  = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    modal.addEventListener('keydown', modal._trapHandler);
  }

  /** LocalStorage バックアップ */
  function lsSave(key, val) {
    try { localStorage.setItem('ttm_' + key, JSON.stringify(val)); } catch (_) {}
  }
  function lsLoad(key) {
    try { var v = localStorage.getItem('ttm_' + key); return v ? JSON.parse(v) : null; } catch (_) { return null; }
  }

  // ════════════════════════════════════════════════════════════════
  // B. Store（アプリ状態）
  // ════════════════════════════════════════════════════════════════

  var Store = {
    kobanList:    [],
    calendarMap:  {},
    holidayNotes: {},
    calendar:     [],
    staff:        [],
    workTypes:    [],
    schedules:    [],
    reports:      {},
    mailLatest:   {},
    today:        toYMD(new Date()),
    viewDate:     toYMD(new Date()),
    dayWidth:     64,
    ganttDays:    [],
    ganttStart:   '',
    ganttEnd:     '',

    kobanByCode: function (code) {
      return this.kobanList.find(function (k) { return k['工番'] === code; }) || null;
    },

    staffById: function (id) {
      return this.staff.find(function (s) { return s.id === id; }) || null;
    },

    BAR_COLORS: ['bar-clay', 'bar-plum', 'bar-ochre', 'bar-moss', 'bar-indigo', 'bar-burgundy', 'bar-stone'],
    kobanColor: function (code) {
      var idx = this.kobanList.findIndex(function (k) { return k['工番'] === code; });
      if (idx < 0) return 'bar-stone';
      return this.BAR_COLORS[idx % this.BAR_COLORS.length];
    }
  };

  // ════════════════════════════════════════════════════════════════
  // C. 起動シーケンス
  // ════════════════════════════════════════════════════════════════

  document.addEventListener('DOMContentLoaded', function () {
    initControls();
    Heartbeat.init();
    loadAll();
  });

  /**
   * gasPromise: google.script.run を Promise でラップ
   */
  function gasPromise(fn, arg1, arg2) {
    return new Promise(function (res, rej) {
      var runner = google.script.run
        .withSuccessHandler(res)
        .withFailureHandler(rej);
      if (arg2 !== undefined) runner[fn](arg1, arg2);
      else if (arg1 !== undefined) runner[fn](arg1);
      else runner[fn]();
    });
  }

  /**
   * 起動時データ読み込み。
   * Phase 1: getMasterPayload + getActiveStaff + getWorkTypes + getSchedules を並列実行
   * Phase 2: getDailyReports(date) 単発呼び出し（FIX-3: 全スタッフ一括取得）
   */
  function loadAll() {
    var today = Store.today;
    var start = offsetDate(today, -30);
    var end   = offsetDate(today, 90);
    Store.ganttStart = start;
    Store.ganttEnd   = end;

    // Phase 1: マスタ / スタッフ / 作業種別 / スケジュール を並列取得
    Promise.all([
      gasPromise('getMasterPayload'),
      gasPromise('getActiveStaff'),
      gasPromise('getWorkTypes'),
      gasPromise('getSchedules', start, end)
    ]).then(function (results) {
      var master    = results[0] || {};
      var staff     = results[1] || [];
      var workTypes = results[2] || [];
      var schedules = results[3] || [];

      Store.kobanList   = master.kobanList   || [];
      Store.calendarMap = master.calendarMap || {};
      Store.calendar    = master.calendar    || [];
      Store.staff       = staff;

      Store.holidayNotes = {};
      Store.calendar.forEach(function (c) {
        if (!c['備考']) return;
        var rawDate = c['日付'];
        var key = (rawDate instanceof Date)
          ? rawDate.toISOString().slice(0, 10)
          : String(rawDate).slice(0, 10);
        Store.holidayNotes[key] = c['備考'];
      });
      Store.workTypes   = workTypes;
      Store.schedules   = schedules;

      buildGanttDays();
      renderPageHeader();
      renderGanttLegend();
      GanttView.render();
      GanttView.renderBars();

      // FIX-3: Phase 2 を全件一括取得に変更
      // getDailyReports(date) で全スタッフ分を1回で取得
      // 失敗しても各スタッフを個別 fallback で取得し、全員必ず表示
      if (staff.length === 0) {
        Store.reports = {};
        Store.mailLatest = {};
        ReportView.render();
        return;
      }

      return Promise.all([
        // FIX-3: 全件一括取得を試み、失敗したら各スタッフ個別取得にフォールバック
        gasPromise('getDailyReportsByDate', today)
          .then(function (rows) {
            // 戻り値が配列 → 全スタッフ分をまとめて返すシグネチャ
            var rmap = {};
            (rows || []).forEach(function (r) {
              if (!rmap[r.staffId]) rmap[r.staffId] = [];
              rmap[r.staffId].push(r);
            });
            return rmap;
          })
          .catch(function () {
            // fallback: staffIdごとに個別取得
            return Promise.all(staff.map(function (s) {
              return gasPromise('getDailyReports', s.id, today)
                .then(function (rows) { return { staffId: s.id, rows: rows || [] }; })
                .catch(function () { return { staffId: s.id, rows: [] }; });
            })).then(function (arr) {
              var rmap = {};
              arr.forEach(function (r) { rmap[r.staffId] = r.rows; });
              return rmap;
            });
          }),
        // メール状態: 各スタッフ並列取得（失敗しても止まらない）
        Promise.all(staff.map(function (s) {
          return gasPromise('getLatestMailRequestFor', s.id, today)
            .then(function (mq) { return { staffId: s.id, mq: mq || null }; })
            .catch(function () { return { staffId: s.id, mq: null }; });
        }))
      ]).then(function (results) {
        Store.reports    = results[0];
        var mmap = {};
        results[1].forEach(function (r) { mmap[r.staffId] = r.mq; });
        Store.mailLatest = mmap;
        ReportView.render();
        lsSave('reports_' + today, Store.reports);
      });

    }).catch(function (err) {
      toast('データの読み込みに失敗しました: ' + String(err.message || err), 'err');
      var cached = lsLoad('reports_' + Store.today);
      if (cached) {
        Store.reports = cached;
        ReportView.render();
      }
    });
  }

  /**
   * 日付変更時に日報・最新メール状態を再取得して再描画する。
   * FIX-3: 全件一括取得 + fallback パターンを共通化
   */
  function getDailyReportsForDate(date) {
    if (!Store.staff.length) return;

    // FIX-3: 単発呼び出しを試み、失敗なら個別 fallback
    gasPromise('getDailyReportsByDate', date)
      .then(function (rows) {
        var rmap = {};
        (rows || []).forEach(function (r) {
          if (!rmap[r.staffId]) rmap[r.staffId] = [];
          rmap[r.staffId].push(r);
        });
        return rmap;
      })
      .catch(function () {
        return Promise.all(Store.staff.map(function (s) {
          return gasPromise('getDailyReports', s.id, date)
            .then(function (rows) { return { staffId: s.id, rows: rows || [] }; })
            .catch(function () { return { staffId: s.id, rows: [] }; });
        })).then(function (arr) {
          var rmap = {};
          arr.forEach(function (r) { rmap[r.staffId] = r.rows; });
          return rmap;
        });
      })
      .then(function (rmap) {
        Store.reports = rmap;
        return Promise.all(Store.staff.map(function (s) {
          return gasPromise('getLatestMailRequestFor', s.id, date)
            .then(function (mq) { return { staffId: s.id, mq: mq || null }; })
            .catch(function () { return { staffId: s.id, mq: null }; });
        }));
      })
      .then(function (arr) {
        var mmap = {};
        arr.forEach(function (r) { mmap[r.staffId] = r.mq; });
        Store.mailLatest = mmap;
        ReportView.render();
      });
  }

  // ════════════════════════════════════════════════════════════════
  // D. 日付ユーティリティ
  // ════════════════════════════════════════════════════════════════

  function offsetDate(ymd, days) {
    var d = parseDate(ymd);
    d.setDate(d.getDate() + days);
    return toYMD(d);
  }

  function buildGanttDays() {
    var days = [];
    var cur = parseDate(Store.ganttStart);
    var end = parseDate(Store.ganttEnd);
    while (cur <= end) {
      var ds = toYMD(cur);
      var dow = cur.getDay();
      var cal = Store.calendarMap[ds] || null;
      var isWeekend = (dow === 0 || dow === 6) && cal !== '出勤土曜';
      var isWorkSat = cal === '出勤土曜';
      var holidayName = Store.holidayNotes[ds] || ((cal === '祝日' || cal === '休日') ? cal : '');
      days.push({
        dateStr:     ds,
        dow:         dow,
        dowJa:       DOW_JA[dow],
        isToday:     ds === Store.today,
        isWeekend:   isWeekend,
        isWorkSat:   isWorkSat,
        holidayName: holidayName
      });
      cur.setDate(cur.getDate() + 1);
    }
    Store.ganttDays = days;
  }

  /** ガント列インデックス（0-indexed）を返す */
  function dayIndex(dateStr) {
    return Store.ganttDays.findIndex(function (d) { return d.dateStr === dateStr; });
  }

  // ════════════════════════════════════════════════════════════════
  // E. ページヘッダ・凡例
  // ════════════════════════════════════════════════════════════════

  function renderPageHeader() {
    var d = parseDate(Store.today);
    var year = d.getFullYear();
    var month = d.getMonth() + 1;
    var day   = d.getDate();
    var dow   = DOW_JA[d.getDay()];
    var label = year + '年' + month + '月' + day + '日（' + dow + '）';

    var el = document.getElementById('page-date-eyebrow');
    if (el) el.textContent = label;
    // report-date-label はヘッダ日付と重複するため削除済み
  }

  function renderGanttLegend() {
    var legend = document.getElementById('gantt-legend');
    if (!legend) return;
    // マイナス思考: 「一般」「不在」のダミー swatch は削除（実際の工番に紐づかない装飾）
    var html = Store.kobanList.slice(0, 7).map(function (k, i) {
      var barClass = Store.BAR_COLORS[i % Store.BAR_COLORS.length];
      return '<span class="flex items-center gap-1.5"><span class="swatch ' + barClass + '"></span>' + esc(k['工番']) + '</span>';
    }).join('');
    legend.innerHTML = html;
  }

  // ════════════════════════════════════════════════════════════════
  // F. GanttView
  // ════════════════════════════════════════════════════════════════

  var GanttView = {
    dayWidth: 64,

    render: function () {
      var dw = Store.dayWidth;
      this.dayWidth = dw;
      this._renderHeaders();
      this._renderStaffRows();
      this._scrollToToday();
    },

    _renderHeaders: function () {
      var dw = this.dayWidth;
      var days = Store.ganttDays;
      var n    = days.length;
      var grid = document.getElementById('gantt-days-grid');
      if (!grid) return;

      var staffCount = Store.staff.length;
      grid.style.gridTemplateColumns = 'repeat(' + n + ', ' + dw + 'px)';
      grid.style.gridTemplateRows    = '32px 32px repeat(' + Math.max(staffCount, 1) + ', 56px)';

      var months = [];
      var curMonth = '';
      var curStart = 1;
      days.forEach(function (d, i) {
        var ym = d.dateStr.slice(0, 7);
        if (ym !== curMonth) {
          if (curMonth) months.push({ label: curMonth, start: curStart, span: i - curStart + 1 });
          curMonth = ym;
          curStart = i + 1;
        }
      });
      if (curMonth) months.push({ label: curMonth, start: curStart, span: n - curStart + 1 });

      var html = '';

      months.forEach(function (m) {
        var parts = m.label.split('-');
        var label = parts[0] + '年 ' + (+parts[1]) + '月';
        html += '<div class="gantt-month" style="grid-column:' + m.start + ' / span ' + m.span + ';">' + label + '</div>';
      });

      days.forEach(function (d, i) {
        var cls = 'gantt-day-head';
        if (d.isToday)   cls += ' today';
        else if (d.isWeekend) cls += ' weekend';
        var dowCls = '';
        if (d.dow === 6 && !d.isWorkSat) dowCls = 'sat';
        else if (d.dow === 0) dowCls = 'sun';
        if (dowCls) cls += ' ' + dowCls;

        var badge = d.isWorkSat ? '<span class="badge-worksat">出勤</span>' : '';
        var tooltipAttr = d.holidayName ? ' title="' + d.holidayName + '"' : '';

        html += '<div class="' + cls + '"' + tooltipAttr + '>';
        html += '<span class="dnum">' + (+d.dateStr.slice(8)) + '</span>';
        html += '<span class="dow">' + d.dowJa + '</span>';
        if (badge) html += badge;
        html += '</div>';
      });

      grid.innerHTML = html;
      this._appendStaffRowCells(grid);
    },

    _appendStaffRowCells: function (grid) {
      var dw   = this.dayWidth;
      var days = Store.ganttDays;
      var n    = days.length;

      Store.staff.forEach(function (s, rowIdx) {
        var gridRow = rowIdx + 3;
        var rowDiv = document.createElement('div');
        rowDiv.style.cssText = 'grid-row:' + gridRow + '; grid-column:1 / span ' + n + '; position:relative; border-bottom:1px solid var(--line);';
        rowDiv.style.background = (rowIdx % 2 === 1) ? 'var(--bg-row)' : 'transparent';
        rowDiv.dataset.staffId = s.id;
        rowDiv.dataset.rowIdx  = rowIdx;
        rowDiv.classList.add('gantt-row');

        var cellsDiv = document.createElement('div');
        cellsDiv.style.cssText = 'position:absolute; inset:0; display:grid; grid-template-columns:repeat(' + n + ', ' + dw + 'px);';
        days.forEach(function (d) {
          var cell = document.createElement('div');
          cell.className = 'gantt-cell' + (d.isWeekend ? ' weekend' : '') + (d.isToday ? ' today' : '');
          cellsDiv.appendChild(cell);
        });
        rowDiv.appendChild(cellsDiv);

        var overlay = document.createElement('div');
        overlay.className = 'gantt-row-overlay';
        overlay.dataset.staffId = s.id;
        DragCreate.attachOverlay(overlay);
        rowDiv.appendChild(overlay);

        grid.appendChild(rowDiv);
      });
    },

    _renderStaffRows: function () {
      var staffCol = document.getElementById('gantt-staff-col');
      if (!staffCol) return;

      var header = staffCol.querySelector('.staff-cell.header');
      staffCol.innerHTML = '';
      if (header) staffCol.appendChild(header);
      else {
        var h = document.createElement('div');
        h.className = 'staff-cell header';
        h.style.height = '64px';
        h.textContent = 'スタッフ';
        staffCol.appendChild(h);
      }

      Store.staff.forEach(function (s, i) {
        var avClass = 'av-' + ((i % 7) + 1);
        var isLast  = (i === Store.staff.length - 1);
        var cell = document.createElement('div');
        cell.className = 'staff-cell';
        if (isLast) cell.style.borderBottom = 'none';
        var initial = s.name ? esc(s.name.charAt(0)) : '?';
        var noText  = (i % 7 === 2) ? '' : 'text-white';
        cell.innerHTML =
          '<div class="avatar ' + avClass + ' ' + noText + '">' + initial + '</div>' +
          '<div class="name"><span>' + esc(s.name) + '</span><span class="email mono">' + esc((s.email || '').split('@')[0]) + '</span></div>';
        staffCol.appendChild(cell);
      });
    },

    _scrollToToday: function () {
      var container = document.getElementById('gantt-scroll-container');
      if (!container) return;
      var todayIdx = dayIndex(Store.today);
      if (todayIdx < 0) return;
      var scrollLeft = todayIdx * this.dayWidth - container.clientWidth / 2 + this.dayWidth / 2;
      container.scrollLeft = Math.max(0, scrollLeft);
    },

    renderBars: function () {
      document.querySelectorAll('.gantt-bar').forEach(function (b) { b.remove(); });

      Store.schedules.forEach(function (sch) {
        var staffIdx = Store.staff.findIndex(function (s) { return s.id === sch.staffId; });
        if (staffIdx < 0) return;

        var startIdx = dayIndex(sch.startDate);
        var endIdx   = dayIndex(sch.endDate);
        if (startIdx < 0 && endIdx < 0) return;
        startIdx = Math.max(0, startIdx);
        endIdx   = Math.min(Store.ganttDays.length - 1, endIdx);
        if (startIdx > endIdx) return;

        var dw    = GanttView.dayWidth;
        var left  = startIdx * dw + 4;
        var width = (endIdx - startIdx + 1) * dw - 8;

        var barClass = sch.kobanCode ? Store.kobanColor(sch.kobanCode) : 'bar-stone';

        var koban  = sch.kobanCode || '';
        var master = Store.kobanByCode(koban);
        var client = master ? (master['受注先'] || '') : '';
        var wt = Store.workTypes.find(function (w) { return w.id === sch.workTypeId; });
        var wtName = wt ? wt.name : (sch.note || '');
        var label = [koban, client, wtName].filter(Boolean).join(' · ');

        var bar = document.createElement('div');
        bar.className = 'gantt-bar ' + barClass;
        bar.style.left  = left + 'px';
        bar.style.width = width + 'px';
        bar.textContent = label;
        bar.dataset.id  = sch.id;

        DragMove.attach(bar, sch);

        bar.addEventListener('dblclick', function (e) {
          e.stopPropagation();
          GanttEditModal.open(sch);
        });

        var lh = document.createElement('div');
        lh.className = 'resize-handle left';
        lh.addEventListener('mousedown', function (e) { DragResize.start(e, bar, sch, 'left'); });
        bar.appendChild(lh);

        var rh = document.createElement('div');
        rh.className = 'resize-handle right';
        rh.addEventListener('mousedown', function (e) { DragResize.start(e, bar, sch, 'right'); });
        bar.appendChild(rh);

        if (master && master['納入先住所']) {
          bar.title = master['納入先住所'];
        }

        var rowGrid = document.getElementById('gantt-days-grid');
        if (!rowGrid) return;
        var rows = rowGrid.querySelectorAll('.gantt-row');
        if (rows[staffIdx]) rows[staffIdx].appendChild(bar);
      });
    }
  };

  // ════════════════════════════════════════════════════════════════
  // G. ドラッグ操作
  // ════════════════════════════════════════════════════════════════

  var DragCreate = {
    attachOverlay: function (overlay) {
      var startX = 0, ghost = null, startCol = 0;

      function onMove(e) {
        if (!ghost) return;
        var rect    = overlay.getBoundingClientRect();
        var curCol  = Math.max(startCol, Math.floor((e.clientX - rect.left) / GanttView.dayWidth));
        var left    = startCol * GanttView.dayWidth + 4;
        var width   = (curCol - startCol + 1) * GanttView.dayWidth - 8;
        ghost.style.left  = left + 'px';
        ghost.style.width = width + 'px';
      }

      function onUp(e) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (!ghost) return;
        var rect   = overlay.getBoundingClientRect();
        var endCol = Math.max(startCol, Math.floor((e.clientX - rect.left) / GanttView.dayWidth));
        ghost.remove();
        ghost = null;

        var startDate = Store.ganttDays[startCol] ? Store.ganttDays[startCol].dateStr : null;
        var endDate   = Store.ganttDays[endCol]   ? Store.ganttDays[endCol].dateStr   : null;
        if (!startDate || !endDate) return;

        var staffId = overlay.dataset.staffId;
        GanttEditModal.open({
          id:        '',
          staffId:   staffId,
          startDate: startDate,
          endDate:   endDate,
          kobanCode: '',
          workTypeId: '',
          note:      ''
        });
      }

      overlay.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        e.preventDefault();
        startX   = e.clientX;
        startCol = Math.floor((e.clientX - overlay.getBoundingClientRect().left) / GanttView.dayWidth);
        ghost = document.createElement('div');
        ghost.className = 'gantt-drag-ghost bar-clay';
        ghost.style.left  = (startCol * GanttView.dayWidth + 4) + 'px';
        ghost.style.width = (GanttView.dayWidth - 8) + 'px';
        overlay.parentNode.appendChild(ghost);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
  };

  var DragMove = {
    attach: function (bar, sch) {
      var startX = 0, origLeft = 0;
      var dragging = false;
      var origStartDate = '', origEndDate = '';

      function onMove(e) {
        if (!dragging) return;
        var delta = e.clientX - startX;
        bar.style.left = (origLeft + delta) + 'px';
      }

      function onUp(e) {
        if (!dragging) return;
        dragging = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        bar.style.opacity = '';
        bar.style.zIndex  = '';

        var newLeft = parseInt(bar.style.left);
        var colDelta = Math.round((newLeft - origLeft) / GanttView.dayWidth);
        if (colDelta === 0) return;

        var startD = parseDate(sch.startDate);
        var endD   = parseDate(sch.endDate);
        startD.setDate(startD.getDate() + colDelta);
        endD.setDate(endD.getDate() + colDelta);
        var newStart = toYMD(startD);
        var newEnd   = toYMD(endD);

        sch.startDate = newStart;
        sch.endDate   = newEnd;
        GanttView.renderBars();

        var savedOrigStart = origStartDate;
        var savedOrigEnd   = origEndDate;
        google.script.run
          .withFailureHandler(function (err) {
            toast('移動の保存に失敗しました: ' + String(err.message || err), 'err');
            sch.startDate = savedOrigStart;
            sch.endDate   = savedOrigEnd;
            GanttView.renderBars();
          })
          .updateSchedule(sch.id, { startDate: newStart, endDate: newEnd });
      }

      bar.addEventListener('mousedown', function (e) {
        if (e.target.classList.contains('resize-handle')) return;
        if (e.button !== 0) return;
        e.preventDefault();
        dragging = true;
        startX        = e.clientX;
        origLeft      = parseInt(bar.style.left);
        origStartDate = sch.startDate;
        origEndDate   = sch.endDate;
        bar.style.opacity = '0.8';
        bar.style.zIndex  = '20';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
  };

  var DragResize = {
    start: function (e, bar, sch, side) {
      e.preventDefault();
      e.stopPropagation();
      var startX        = e.clientX;
      var origLeft      = parseInt(bar.style.left);
      var origWidth     = parseInt(bar.style.width);
      var origStartDate = sch.startDate;
      var origEndDate   = sch.endDate;

      function onMove(ev) {
        var delta = ev.clientX - startX;
        if (side === 'right') {
          bar.style.width = Math.max(GanttView.dayWidth, origWidth + delta) + 'px';
        } else {
          var newLeft  = origLeft + delta;
          var newWidth = origWidth - delta;
          if (newWidth < GanttView.dayWidth) return;
          bar.style.left  = newLeft + 'px';
          bar.style.width = newWidth + 'px';
        }
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);

        var startCol = Math.round(parseInt(bar.style.left) / GanttView.dayWidth);
        var span     = Math.round(parseInt(bar.style.width) / GanttView.dayWidth);
        var endCol   = startCol + span - 1;

        var newStart = Store.ganttDays[startCol] ? Store.ganttDays[startCol].dateStr : sch.startDate;
        var newEnd   = Store.ganttDays[endCol]   ? Store.ganttDays[endCol].dateStr   : sch.endDate;

        sch.startDate = newStart;
        sch.endDate   = newEnd;
        GanttView.renderBars();

        google.script.run
          .withFailureHandler(function (err) {
            toast('リサイズの保存に失敗: ' + String(err.message || err), 'err');
            sch.startDate = origStartDate;
            sch.endDate   = origEndDate;
            GanttView.renderBars();
          })
          .updateSchedule(sch.id, { startDate: newStart, endDate: newEnd });
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
  };

  // ════════════════════════════════════════════════════════════════
  // H. ガント編集モーダル

  var GanttEditModal = {
    current: null,

    open: function (sch) {
      this.current = sch;
      var modal = document.getElementById('gantt-edit-modal');
      if (!modal) return;

      document.getElementById('ge-id').value       = sch.id || '';
      document.getElementById('ge-staff-id').value = sch.staffId || '';
      document.getElementById('ge-koban').value    = sch.kobanCode || '';
      document.getElementById('ge-start').value    = sch.startDate || '';
      document.getElementById('ge-end').value      = sch.endDate || '';
      document.getElementById('ge-note').value     = sch.note || '';

      var dl = document.getElementById('koban-datalist');
      if (dl) {
        dl.innerHTML = Store.kobanList.map(function (k) {
          return '<option value="' + escAttr(k['工番']) + '">' + esc(k['工番']) + ' ' + esc(k['受注先'] || '') + '</option>';
        }).join('');
      }

      this._updateKobanInfo(sch.kobanCode);

      var sel = document.getElementById('ge-worktype');
      if (sel) {
        sel.innerHTML = '<option value="">選択…</option>' +
          Store.workTypes.map(function (w) {
            return '<option value="' + escAttr(w.id) + '"' + (w.id === sch.workTypeId ? ' selected' : '') + '>' + esc(w.name) + '</option>';
          }).join('');
      }

      var delBtn = document.getElementById('ge-delete');
      if (delBtn) delBtn.style.display = sch.id ? 'inline-block' : 'none';

      var titleEl = document.getElementById('gantt-modal-title');
      if (titleEl) titleEl.textContent = sch.id ? 'スケジュール編集' : 'スケジュール追加';

      modal.classList.add('open');
      trapFocus(modal);
    },

    close: function () {
      var modal = document.getElementById('gantt-edit-modal');
      if (modal) modal.classList.remove('open');
      this.current = null;
    },

    save: function () {
      var id      = document.getElementById('ge-id').value;
      var staffId = document.getElementById('ge-staff-id').value;
      var koban   = document.getElementById('ge-koban').value;
      var wt      = document.getElementById('ge-worktype').value;
      var start   = document.getElementById('ge-start').value;
      var end     = document.getElementById('ge-end').value;
      var note    = document.getElementById('ge-note').value;

      if (!start || !end) { toast('開始日・終了日を入力してください', 'warn'); return; }
      if (start > end)    { toast('開始日は終了日以前にしてください', 'warn'); return; }

      var record = {
        staffId:    staffId,
        startDate:  start,
        endDate:    end,
        kobanCode:  koban,
        workTypeId: wt,
        note:       note
      };

      if (id) {
        var existing = Store.schedules.find(function (s) { return s.id === id; });
        if (existing) Object.assign(existing, record);
        GanttView.renderBars();
        this.close();

        google.script.run
          .withSuccessHandler(function () { toast('スケジュールを更新しました', 'ok'); })
          .withFailureHandler(function (err) { toast('更新失敗: ' + String(err.message || err), 'err'); })
          .updateSchedule(id, record);
      } else {
        // FIX-4: クライアント側で UUID を事前生成 → 楽観的 UI → 失敗時ロールバック
        var newId = 'sch_' + (window.crypto && crypto.randomUUID
          ? crypto.randomUUID().replace(/-/g, '').substring(0, 16)
          : Math.random().toString(36).substring(2, 18));
        record.id = newId;

        Store.schedules.push(record);
        GanttView.renderBars();
        this.close();

        // FIX-5: ガント追加成功時、対応する日報行を自動生成
        google.script.run
          .withSuccessHandler(function (serverId) {
            if (serverId && serverId !== newId) {
              var existing = Store.schedules.find(function (s) { return s.id === newId; });
              if (existing) existing.id = serverId;
            }
            GanttView.renderBars();  // dataset.id をサーバ確定 id に同期
            toast('スケジュールを追加しました', 'ok');
            // FIX-5: スケジュール追加 → 今日が期間内であれば日報行を自動生成
            var today = Store.today;
            var finalId = (serverId && serverId !== newId) ? serverId : newId;
            if (record.startDate <= today && record.endDate >= today) {
              ReportView.autoAddReportRow(record.staffId, finalId, record);
            }
          })
          .withFailureHandler(function (err) {
            toast('追加失敗: ' + String(err.message || err), 'err');
            // FIX-4: ロールバック
            Store.schedules = Store.schedules.filter(function (s) { return s.id !== newId; });
            GanttView.renderBars();
          })
          .createSchedule(record);
      }
    },

    del: function () {
      var id = document.getElementById('ge-id').value;
      if (!id) return;
      if (!confirm('このスケジュールを削除しますか？')) return;

      Store.schedules = Store.schedules.filter(function (s) { return s.id !== id; });
      GanttView.renderBars();
      this.close();

      google.script.run
        .withSuccessHandler(function () { toast('削除しました'); })
        .withFailureHandler(function (err) { toast('削除失敗: ' + String(err.message || err), 'err'); })
        .deleteSchedule(id);
    },

    _updateKobanInfo: function (code) {
      var info = document.getElementById('ge-koban-info');
      if (!info) return;
      if (!code) { info.textContent = ''; return; }
      var m = Store.kobanByCode(code);
      if (m) {
        info.textContent = '受注先: ' + (m['受注先'] || '—') + ' / 納入先: ' + (m['納入先'] || '—') + ' / ' + (m['品名'] || '');
      } else {
        info.textContent = '';
      }
    }
  };

  // ════════════════════════════════════════════════════════════════
  // I. ReportView（日報カード描画）
  // ════════════════════════════════════════════════════════════════

  var ReportView = {
    render: function () {
      var grid = document.getElementById('report-cards-grid');
      if (!grid) return;
      // FIX-3: Store.staff の全員分を必ず描画（ループを Store.staff 基準にする）
      grid.innerHTML = Store.staff.map(function (s, i) {
        return ReportView._buildCard(s, i);
      }).join('');

      Store.staff.forEach(function (s) {
        ReportView._attachCardHandlers(s);
      });

      lsSave('reports_' + Store.today, Store.reports);
    },

    /**
     * FIX-5: ガント追加後、今日の日報行を自動生成して再描画する
     */
    autoAddReportRow: function (staffId, scheduleId, sch) {
      if (!Store.reports[staffId]) Store.reports[staffId] = [];

      // 同一 linkedScheduleId の行が既に存在する場合はスキップ
      var already = Store.reports[staffId].some(function (r) {
        return r.linkedScheduleId === scheduleId;
      });
      if (already) return;

      var wt = Store.workTypes.find(function (w) { return w.id === sch.workTypeId; });
      var wtName = wt ? wt.name : (sch.note || '');

      var newRow = {
        staffId:          staffId,
        reportDate:       Store.today,
        section:          'today',
        seq:              Date.now(),
        kobanCode:        sch.kobanCode || '',
        workTypeId:       sch.workTypeId || '',
        workTypeName:     wtName,
        note:             sch.note || '',
        dateRange:        Store.today.slice(5).replace('-', '/'),
        periodStart:      sch.startDate,
        periodEnd:        sch.endDate,
        linkedScheduleId: scheduleId
      };

      Store.reports[staffId].push(newRow);
      ReportView.render();

      // バックグラウンドで日報を保存（失敗しても UI は維持）
      SaveQueue.enqueue(newRow);
    },

    _buildCard: function (s, idx) {
      var avClass  = 'av-' + ((idx % 7) + 1);
      var noText   = (idx % 7 === 2) ? '' : ' text-white';
      var initial  = s.name ? s.name.charAt(0) : '?';
      var reports  = Store.reports[s.id] || [];
      var today    = Store.today;

      var todayReps = reports.filter(function (r) { return r.reportDate === today && r.section === 'today'; });
      // 一貫性: MailModal._buildMailBody と同じ section ベースで判定
      var prevReps  = reports.filter(function (r) { return r.section === 'prev' || r.section === 'yesterday'; });

      var mq = (Store.mailLatest && Store.mailLatest[s.id]) || null;
      var mailStatus = 'idle';
      if (mq && mq.status) {
        mailStatus = (mq.status === 'picked') ? 'pending' : mq.status;
      }

      var statusBadge = ReportView._statusBadge(mailStatus);
      var footerHtml  = ReportView._footerHtml(s, mailStatus, reports);

      var todayRows = todayReps.map(function (r) {
        return ReportView._reportRow(r, true);
      }).join('');
      // FIX-6: 追加ボタンを明示的に表示
      todayRows += '<div class="row-line row-add" data-staff-id="' + esc(s.id) + '" data-section="today"><span class="pill">+ 追加</span><span>クリックで作業内容を追加</span><span></span></div>';

      var prevRows = prevReps.map(function (r) {
        return ReportView._reportRow(r, false);
      }).join('');
      prevRows += '<div class="row-line row-add" data-staff-id="' + esc(s.id) + '" data-section="prev"><span class="pill">+ 追加</span><span>クリックで報告を追加</span><span></span></div>';

      var borderStyle = mailStatus === 'pending' ? ' style="border-color:rgba(184,134,42,0.5);"'
                      : mailStatus === 'failed'  ? ' style="border-color:rgba(161,59,42,0.45);"'
                      : '';

      return '<article class="panel rounded-xl overflow-hidden shadow-soft" id="report-card-' + esc(s.id) + '"' + borderStyle + '>' +
        '<header class="px-4 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--line)">' +
          '<div class="flex items-center gap-2.5">' +
            '<div class="w-8 h-8 rounded-full grid place-items-center text-[11px] font-semibold' + noText + ' ' + avClass + '">' + initial + '</div>' +
            '<div class="leading-tight">' +
              '<div class="text-[13.5px] font-semibold">' + esc(s.name) + '</div>' +
              '<div class="text-[10.5px] mono" style="color:var(--txt-3)">' + esc(s.email || '') + '</div>' +
            '</div>' +
          '</div>' +
          statusBadge +
        '</header>' +
        // FIX-1: カード本体に min-width:0 を指定してレイアウト崩れを防ぐ
        '<div class="px-4 py-3" style="min-width:0">' +
          '<div class="text-[11px] font-semibold mb-1.5" style="color:var(--txt-3)">本日の作業内容</div>' +
          '<div class="space-y-1" id="today-rows-' + esc(s.id) + '">' + todayRows + '</div>' +
          '<div class="text-[11px] font-semibold mt-3 mb-1.5" style="color:var(--txt-3)">前日までの報告</div>' +
          '<div class="space-y-1" id="prev-rows-' + esc(s.id) + '">' + prevRows + '</div>' +
        '</div>' +
        footerHtml +
        '</article>';
    },

    _reportRow: function (r, isToday) {
      var pill = isToday ? '<span class="pill pill-accent">' + esc(r.dateRange || Store.today.slice(5).replace('-', '/')) + '</span>'
                         : '<span class="pill">' + esc(r.dateRange || '') + '</span>';
      var koban = r.kobanCode ? '<b class="mono" style="font-weight:600">' + esc(r.kobanCode) + '</b> ' : '';
      var wtName = esc(r.workTypeName || r.note || '');
      var barCls = r.kobanCode ? Store.kobanColor(r.kobanCode) : 'bar-stone';
      var swatch = '<span class="swatch ' + barCls + '"' + (isToday ? '' : ' style="opacity:.5"') + '></span>';
      return '<div class="row-line"><span class="flex-shrink-0">' + pill + '</span><span class="truncate">' + koban + wtName + '</span>' + swatch + '</div>';
    },

    _statusBadge: function (status) {
      var map = {
        'drafted': '<span class="badge badge-drafted">下書き作成済</span>',
        'sent':    '<span class="badge badge-sent">送信済</span>',
        'pending': '<span class="badge badge-pending">送信待ち</span>',
        'failed':  '<span class="badge badge-failed">送信失敗</span>',
        'idle':    '<span class="badge badge-idle">未送信</span>'
      };
      return map[status] || map['idle'];
    },

    // FIX-7/8: メールボタンを各カードに明示配置
    _footerHtml: function (s, status, reports) {
      var mq = (Store.mailLatest && Store.mailLatest[s.id]) || null;
      var lastUpdated = '';
      if (mq) {
        lastUpdated = String(mq.processedAt || mq.createdAt || '').slice(11, 16);
      } else if (reports.length > 0) {
        lastUpdated = String(reports[0].updatedAt || '').slice(11, 16);
      }
      var footerLeft, footerBtn;

      if (status === 'sent') {
        footerLeft = '<span class="text-[11px]" style="color:var(--ok)">本日 <span class="mono">' + lastUpdated + '</span> に送信済</span>';
        // FIX-7/8: 再送ボタンをラベル付きで明示
        footerBtn  = '<button class="btn-secondary text-xs" style="padding:6px 14px" data-action="resend" data-staff-id="' + s.id + '">📧 再送する</button>';
      } else if (status === 'pending') {
        footerLeft = '<span class="text-[11px] flex items-center gap-1.5" style="color:var(--warn)"><span class="inline-block w-1.5 h-1.5 rounded-full" style="background:var(--warn); animation:pulse 1.6s infinite"></span>EXE が処理中</span>';
        footerBtn  = '<button class="btn-secondary text-xs" style="padding:6px 14px; opacity:.6" disabled>処理中…</button>';
      } else if (status === 'failed') {
        footerLeft = '<span class="text-[11px]" style="color:var(--err)">最終試行 <span class="mono">' + lastUpdated + '</span></span>';
        // FIX-7/8: 再送ボタンをラベル付きで明示
        footerBtn  = '<button class="btn-accent text-xs" style="padding:6px 14px" data-action="resend" data-staff-id="' + s.id + '">📧 再送する</button>';
      } else {
        footerLeft = '<span class="text-[11px]" style="color:var(--txt-3)">最終更新 <span class="mono">' + (lastUpdated || '—') + '</span></span>';
        // FIX-7/8: 下書き作成ボタンをラベル付きで明示（各カード右下）
        footerBtn  = '<button class="btn-accent text-xs" style="padding:6px 14px" data-action="draft" data-staff-id="' + s.id + '">📧 メール下書き作成</button>';
      }

      return '<footer class="px-4 py-2.5 flex items-center justify-between" style="border-top:1px solid var(--line); background:var(--bg-soft)">' +
        footerLeft + footerBtn + '</footer>';
    },

    _attachCardHandlers: function (s) {
      var card = document.getElementById('report-card-' + s.id);
      if (!card) return;

      // FIX-6: 追加ボタンのハンドラ
      card.querySelectorAll('.row-add').forEach(function (el) {
        el.addEventListener('click', function () {
          ReportView._openInlineAdd(s, el.dataset.section);
        });
      });

      // FIX-7/8: メール下書きボタン
      var draftBtn = card.querySelector('[data-action="draft"]');
      if (draftBtn) {
        draftBtn.addEventListener('click', function () {
          MailModal.open(s);
        });
      }

      // FIX-7/8: 再送ボタン
      var resendBtn = card.querySelector('[data-action="resend"]');
      if (resendBtn) {
        resendBtn.addEventListener('click', function () {
          MailModal.openResend(s);
        });
      }
    },

    // FIX-6: インライン textarea 入力（日報追加）
    _openInlineAdd: function (s, section) {
      var containerId = section === 'today' ? 'today-rows-' + s.id : 'prev-rows-' + s.id;
      var container = document.getElementById(containerId);
      if (!container) return;

      // 既存フォームがあれば除去（トグル動作）
      var existing = container.querySelector('.inline-add-form');
      if (existing) { existing.remove(); return; }

      // FIX-1: フォームを .inline-add-form クラス（CSS で min-width:0, overflow:hidden）で作成
      var form = document.createElement('div');
      form.className = 'inline-add-form';
      form.style.cssText = 'display:flex; flex-direction:column; gap:6px; padding:8px; background:var(--bg-soft); border-radius:6px; margin-top:4px;';

      var kobanInput = document.createElement('input');
      kobanInput.type = 'text';
      kobanInput.placeholder = '工番（空欄可）';
      // FIX-1: width:100% + box-sizing:border-box
      kobanInput.style.cssText = 'width:100%; box-sizing:border-box; font-size:12px; padding:4px 8px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); min-width:0;';

      // FIX-6: textarea を直接挿入、500文字制限、Enter保存・Shift+Enter改行
      var textarea = document.createElement('textarea');
      textarea.placeholder = '作業内容（Shift+Enter で改行、Enter で保存）';
      textarea.maxLength = 500;
      textarea.rows = 3;
      // FIX-1: textarea に width:100% + box-sizing:border-box + min-width:0
      textarea.style.cssText = 'width:100%; box-sizing:border-box; font-size:12px; padding:4px 8px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); resize:vertical; min-width:0;';

      var counter = document.createElement('div');
      counter.className = 'char-counter';
      counter.textContent = '0 / 500';

      var btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex; gap:6px; justify-content:flex-end;';

      var saveBtn = document.createElement('button');
      saveBtn.textContent = '保存';
      saveBtn.className = 'btn-accent text-xs';
      saveBtn.style.cssText = 'padding:4px 12px;';

      var cancelBtn = document.createElement('button');
      cancelBtn.textContent = 'キャンセル';
      cancelBtn.className = 'btn-secondary text-xs';
      cancelBtn.style.cssText = 'padding:4px 12px;';

      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(saveBtn);
      form.appendChild(kobanInput);
      form.appendChild(textarea);
      form.appendChild(counter);
      form.appendChild(btnRow);
      container.appendChild(form);
      kobanInput.focus();

      // FIX-6: 文字数カウンタ更新
      textarea.addEventListener('input', function () {
        var len = textarea.value.length;
        counter.textContent = len + ' / 500';
        counter.className = 'char-counter' + (len > 500 ? ' over' : '');
      });

      // FIX-6: 保存処理
      function doSave() {
        if (form._saved) return;
        form._saved = true;
        var koban  = kobanInput.value.trim();
        var wtName = textarea.value.trim();
        if (!wtName) { toast('作業内容を入力してください', 'warn'); return; }
        if (wtName.length > 500) { toast('作業内容は500文字以内にしてください', 'warn'); return; }

        var record = {
          staffId:     s.id,
          reportDate:  Store.today,
          section:     section,
          seq:         Date.now(),
          kobanCode:   koban,
          workTypeName: wtName,
          note:        wtName,
          dateRange:   Store.today.slice(5).replace('-', '/')
        };

        if (!Store.reports[s.id]) Store.reports[s.id] = [];
        Store.reports[s.id].push(record);
        // FIX-6: 楽観的UI更新
        ReportView.render();
        // FIX-6: upsertDailyReport で保存
        SaveQueue.enqueue(record);
      }

      saveBtn.addEventListener('click', doSave);
      cancelBtn.addEventListener('click', function () { form.remove(); });

      // FIX-6: Enter で保存（Shift+Enter は改行）
      textarea.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          doSave();
        }
      });

      // FIX-6: blur で保存（フォームの外にフォーカスが移った場合）
      textarea.addEventListener('blur', function () {
        setTimeout(function () {
          // フォーム内に focus が残っているなら何もしない（ボタン押下中・別 input 編集中）
          if (form.contains(document.activeElement)) return;
          if (textarea.value.trim()) doSave();
          else form.remove();
        }, 150);
      });
    }
  };

  // ════════════════════════════════════════════════════════════════
  // J. SaveQueue（楽観的UI + デバウンス保存）
  // ════════════════════════════════════════════════════════════════

  var SaveQueue = {
    _timers: {},

    enqueue: function (record) {
      var key = record.staffId + '_' + record.section + '_' + record.seq;
      clearTimeout(this._timers[key]);
      this._timers[key] = setTimeout(function () {
        // FIX-6: upsertDailyReport を確実に呼び出す
        google.script.run
          .withSuccessHandler(function () {
            toast('日報を保存しました', 'ok');
            lsSave('reports_' + Store.today, Store.reports);
          })
          .withFailureHandler(function (err) {
            toast('保存失敗: ' + String(err.message || err) + '（ローカルにバックアップ済み）', 'err');
            lsSave('reports_backup_' + Date.now(), record);
          })
          .upsertDailyReport(record);
      }, 800);  // FIX-6: デバウンス 800ms（リロード前に flush される確率を上げるため短縮）
    }
  };

  // ════════════════════════════════════════════════════════════════
  // K. MailModal（メール送信モーダル）
  // ════════════════════════════════════════════════════════════════

  var MailModal = {
    _currentStaff: null,
    _isResend: false,
    _originalMailId: null,

    open: function (staff) {
      this._currentStaff = staff;
      this._isResend     = false;
      this._originalMailId = null;
      this._populate(staff);
      var mailModal = document.getElementById('mail-modal');
      mailModal.classList.add('open');
      trapFocus(mailModal);
    },

    openResend: function (staff) {
      var mq = (Store.mailLatest && Store.mailLatest[staff.id]) || null;
      var mailStatus = mq ? mq.status : 'idle';
      if (!mq) {
        toast('再送可能な依頼が見つかりません。', 'warn');
        return;
      }
      if (mailStatus === 'sent') {
        if (!confirm('既に送信済みです。本当に再送しますか？')) return;
      }
      this._currentStaff   = staff;
      this._isResend       = true;
      this._originalMailId = mq.id;
      this._populate(staff);
      var mailModalResend = document.getElementById('mail-modal');
      mailModalResend.classList.add('open');
      trapFocus(mailModalResend);
    },

    close: function () {
      document.getElementById('mail-modal').classList.remove('open');
      this._currentStaff = null;
    },

    _populate: function (staff) {
      var setId = function (id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };

      var avEl = document.getElementById('modal-staff-avatar');
      if (avEl) {
        var staffIdx = Store.staff.findIndex(function (s) { return s.id === staff.id; });
        avEl.className = 'w-7 h-7 rounded-full grid place-items-center text-[10.5px] font-semibold text-white av-' + ((staffIdx % 7) + 1);
        avEl.textContent = staff.name ? staff.name.charAt(0) : '?';
      }
      setId('modal-staff-name',  staff.name || '');
      setId('modal-staff-email', staff.email || '');

      var others = Store.staff.filter(function (s) { return s.id !== staff.id && s.email; });
      var toCount = document.getElementById('modal-to-count');
      if (toCount) toCount.textContent = others.length + '名';
      var toDiv = document.getElementById('modal-to-addresses');
      if (toDiv) toDiv.innerHTML = others.map(function (s) { return '<div>' + esc(s.email) + '</div>'; }).join('');

      var badge = document.getElementById('modal-email-match-badge');
      if (badge) {
        var matched = !!staff.email;
        badge.textContent = matched ? '✓ 一致確認OK' : '⚠ メール未設定';
        badge.className   = 'badge ' + (matched ? 'badge-sent' : 'badge-failed');
      }
      var subBtn = document.getElementById('mail-modal-submit');
      if (subBtn) {
        subBtn.disabled = !staff.email;
        subBtn.style.opacity = staff.email ? '' : '0.5';
      }

      var preview = document.getElementById('modal-body-preview');
      if (preview) preview.textContent = this._buildMailBody(staff);
    },

    _buildItems: function (reps) {
      return reps.map(function (r) {
        var koban  = r.kobanCode || '';
        var master = koban ? Store.kobanByCode(koban) : null;
        var customer    = master ? (master['受注先']  || '') : '';
        var productName = master ? (master['品名']    || '') : '';
        var wt = r.workTypeId
          ? Store.workTypes.find(function (w) { return w.id === r.workTypeId; })
          : null;
        var workType = wt ? wt.name : (r.workTypeName || '');
        var ymd2slash = function (s) { return String(s || '').replace(/-/g, '/'); };
        var ps = ymd2slash(r.periodStart || r.reportDate || Store.today);
        var pe = ymd2slash(r.periodEnd   || r.reportDate || Store.today);
        return {
          periodStart: ps,
          periodEnd:   pe,
          kobanCode:   koban,
          customer:    customer,
          productName: productName,
          workType:    workType,
          detail:      r.detail || r.note || ''
        };
      });
    },

    _buildMailBody: function (staff) {
      var reports = Store.reports[staff.id] || [];
      var today   = Store.today;
      var d       = parseDate(today);
      var dateLabel = d.getFullYear() + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + ('0'+d.getDate()).slice(-2);

      var todayReps = reports.filter(function (r) { return r.reportDate === today && r.section === 'today'; });
      var prevReps  = reports.filter(function (r) { return r.section === 'prev' || r.section === 'yesterday'; });

      var todayItems = MailModal._buildItems(todayReps);
      var prevItems  = MailModal._buildItems(prevReps);

      function formatItems(items) {
        if (!items.length) return '　（記録なし）';
        return items.map(function (it, i) {
          var period = it.periodStart + '〜' + it.periodEnd;
          var optional = ['kobanCode', 'customer', 'productName']
            .map(function (k) { return (it[k] || '').toString().trim(); })
            .filter(function (v) { return v; });
          var parts = [period].concat(optional).concat(['/', it.workType]);
          if ((it.detail || '').trim()) parts.push(it.detail);
          return (i+1) + '. ' + parts.join('  ');
        }).join('\n');
      }

      return 'お疲れ様です。' + staff.name + ' です。\n' +
        '本日の業務をご報告いたします。\n\n' +
        '▼ 本日の作業内容\n' + formatItems(todayItems) + '\n\n' +
        '▼ 前日までの作業報告\n' + formatItems(prevItems) + '\n\n' +
        '以上、よろしくお願いいたします。';
    },

    submit: function () {
      var staff = this._currentStaff;
      if (!staff) return;

      if (!staff.email) {
        toast('このスタッフのメールアドレスが未設定です。Staff シートで設定してください。', 'err');
        return;
      }

      var modeEl = document.querySelector('input[name="mail-mode"]:checked');
      var mode   = modeEl ? modeEl.value : 'draft';

      var others  = Store.staff.filter(function (s) { return s.id !== staff.id && s.email; });
      var toAddresses = others.map(function (s) { return s.email; });
      if (toAddresses.length === 0) {
        toast('送信先メールアドレスが 1 件も無いため登録できません。', 'err');
        return;
      }

      var submitBtn = document.getElementById('mail-modal-submit');
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '登録中…'; }

      var self = this;

      if (this._isResend && this._originalMailId) {
        google.script.run
          .withSuccessHandler(function (result) {
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '依頼を登録する'; }
            if (result && result.success) {
              toast('再送依頼を登録しました（ID: ' + result.newId + '）', 'ok');
              self.close();
              getDailyReportsForDate(Store.today);
            } else {
              toast('再送失敗: ' + (result ? result.reason : '不明'), 'err');
            }
          })
          .withFailureHandler(function (err) {
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '依頼を登録する'; }
            toast('再送失敗: ' + String(err.message || err), 'err');
          })
          .retryMailItem(this._originalMailId);
      } else {
        var reports = Store.reports[staff.id] || [];
        var todayReps = reports.filter(function (r) { return r.reportDate === Store.today && r.section === 'today'; });
        var prevReps  = reports.filter(function (r) { return r.section === 'prev' || r.section === 'yesterday'; });

        var rdSlash = String(Store.today).replace(/-/g, '/');
        var subjectVars = {
          staffName:  staff.name || '',
          reportDate: rdSlash
        };
        var bodyVars = {
          staffName:      staff.name || '',
          reportDate:     rdSlash,
          todayItems:     this._buildItems(todayReps),
          yesterdayItems: this._buildItems(prevReps)
        };

        var params = {
          requestedBy:   'imaizumi',
          targetStaffId: staff.id,
          reportDate:    Store.today,
          mode:          mode,
          toAddresses:   toAddresses,
          ccAddresses:   '',
          subjectVars:   JSON.stringify(subjectVars),
          bodyVars:      JSON.stringify(bodyVars)
        };

        google.script.run
          .withSuccessHandler(function (result) {
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '依頼を登録する'; }
            if (result && result.success) {
              toast('メール依頼を登録しました', 'ok');
              self.close();
              getDailyReportsForDate(Store.today);
            } else {
              toast('登録失敗: ' + (result ? result.reason : '不明'), 'err');
            }
          })
          .withFailureHandler(function (err) {
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '依頼を登録する'; }
            toast('登録失敗: ' + String(err.message || err), 'err');
          })
          .enqueueMailRequest(params);
      }
    }
  };

  // ════════════════════════════════════════════════════════════════
  // L. Heartbeat（死活監視 UI）
  // ════════════════════════════════════════════════════════════════

  var Heartbeat = {
    _lastSeen: null,
    _timer:    null,
    DEAD_THRESHOLD_MS: 5 * 60 * 1000,

    init: function () {
      var self = this;
      this._timer = setInterval(function () { self._fetchAndUpdate(); }, 30000);
      this._fetchAndUpdate();
    },

    _fetchAndUpdate: function () {
      var self = this;
      try {
        google.script.run
          .withSuccessHandler(function (ts) {
            if (ts) self._lastSeen = new Date(ts);
            self._update();
          })
          .withFailureHandler(function () { self._update(); })
          .getSetting('LAST_HEARTBEAT_TIMESTAMP');
      } catch (_e) {
        self._update();
      }
    },

    _update: function () {
      var dot   = document.getElementById('heartbeat-dot');
      var label = document.getElementById('heartbeat-time');
      if (!dot || !label) return;

      if (!this._lastSeen) {
        dot.className   = 'heartbeat';
        label.textContent = '· 未確認';
        return;
      }

      var elapsed = Date.now() - this._lastSeen.getTime();
      var secAgo  = Math.floor(elapsed / 1000);
      var minAgo  = Math.floor(secAgo / 60);
      var timeStr = secAgo < 60 ? secAgo + '秒前' : minAgo + '分前';

      if (elapsed > this.DEAD_THRESHOLD_MS) {
        dot.className   = 'heartbeat dead';
        label.textContent = '· ' + timeStr + '（応答なし）';
      } else {
        dot.className   = 'heartbeat';
        label.textContent = '· ' + timeStr;
      }
    }
  };

  // ════════════════════════════════════════════════════════════════
  // M. コントロール初期化
  // ════════════════════════════════════════════════════════════════

  function initControls() {
    // メールモーダル閉じる
    ['mail-modal-close', 'mail-modal-cancel'].forEach(function (id) {
      var btn = document.getElementById(id);
      if (btn) btn.addEventListener('click', function () { MailModal.close(); });
    });

    // メールモーダル送信
    var submitBtn = document.getElementById('mail-modal-submit');
    if (submitBtn) submitBtn.addEventListener('click', function () { MailModal.submit(); });

    // メールモーダル送信モード切替
    document.querySelectorAll('input[name="mail-mode"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        var draftLabel = document.getElementById('modal-mode-draft-label');
        var sendLabel  = document.getElementById('modal-mode-send-label');
        if (!draftLabel || !sendLabel) return;
        if (this.value === 'draft') {
          draftLabel.style.border     = '1.5px solid var(--accent)';
          draftLabel.style.background = 'var(--accent-soft)';
          sendLabel.style.border      = '1px solid var(--line-2)';
          sendLabel.style.background  = 'var(--bg-panel)';
        } else {
          sendLabel.style.border      = '1.5px solid var(--accent)';
          sendLabel.style.background  = 'var(--accent-soft)';
          draftLabel.style.border     = '1px solid var(--line-2)';
          draftLabel.style.background = 'var(--bg-panel)';
        }
      });
    });

    // モーダル背景クリックで閉じる
    var mailModal = document.getElementById('mail-modal');
    if (mailModal) {
      mailModal.addEventListener('click', function (e) {
        if (e.target === this) MailModal.close();
      });
    }

    // ガント編集モーダル
    var geClose  = document.getElementById('gantt-modal-close');
    var geCancel = document.getElementById('ge-cancel');
    var geSave   = document.getElementById('ge-save');
    var geDelete = document.getElementById('ge-delete');

    if (geClose)  geClose.addEventListener('click',  function () { GanttEditModal.close(); });
    if (geCancel) geCancel.addEventListener('click', function () { GanttEditModal.close(); });
    if (geSave)   geSave.addEventListener('click',   function () { GanttEditModal.save(); });
    if (geDelete) geDelete.addEventListener('click',  function () { GanttEditModal.del(); });

    var geModal = document.getElementById('gantt-edit-modal');
    if (geModal) {
      geModal.addEventListener('click', function (e) {
        if (e.target === this) GanttEditModal.close();
      });
    }

    var geKoban = document.getElementById('ge-koban');
    if (geKoban) {
      geKoban.addEventListener('input', function () {
        GanttEditModal._updateKobanInfo(this.value);
      });
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        MailModal.close();
        GanttEditModal.close();
      }
    });
  }

})();
</script>
