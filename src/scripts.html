<script>
(function () {
  'use strict';

  // ════════════════════════════════════════════════════════════════
  // A. ユーティリティ
  // ════════════════════════════════════════════════════════════════

  /** HTML エスケープ（XSS 対策） */
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = String(s == null ? '' : s);
    return d.innerHTML;
  }

  /** attribute value 用エスケープ（" と & のみ。innerHTML text 部分は esc() を使う） */
  function escAttr(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  /** 日付を YYYY-MM-DD に変換 */
  function toYMD(d) {
    if (!d) return '';
    if (typeof d === 'string') return d.slice(0, 10);
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  }

  /** YYYY-MM-DD → Date */
  function parseDate(s) {
    if (!s) return null;
    var p = String(s).split('-');
    return new Date(+p[0], +p[1] - 1, +p[2]);
  }

  /** 日本語曜日 */
  var DOW_JA = ['日', '月', '火', '水', '木', '金', '土'];

  /** Toast 通知 */
  function toast(msg, type) {
    var c = document.getElementById('toast-container');
    var el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(function () { el.remove(); }, 3500);
  }

  /** モーダルフォーカストラップ */
  function trapFocus(modal) {
    if (modal._trapHandler) {
      modal.removeEventListener('keydown', modal._trapHandler);
    }
    var focusables = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (!focusables.length) return;
    focusables[0].focus();
    modal._trapHandler = function(e) {
      if (e.key !== 'Tab') return;
      var first = focusables[0];
      var last  = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    modal.addEventListener('keydown', modal._trapHandler);
  }

  /** role='external' を除外する UI 用スタッフ判定 */
  function isUiStaff(s) {
    return String(s.role || '').toLowerCase() !== 'external';
  }

  /** LocalStorage バックアップ */
  function lsSave(key, val) {
    try { localStorage.setItem('ttm_' + key, JSON.stringify(val)); } catch (_) {}
  }
  function lsLoad(key) {
    try { var v = localStorage.getItem('ttm_' + key); return v ? JSON.parse(v) : null; } catch (_) { return null; }
  }

  /**
   * GAS 呼び出しを安全に実行し、失敗時は toast で通知して null を返す。
   * Promise.allSettled 相当のパターンで部分失敗を吸収する。
   */
  function safeCall(fn, label) {
    return fn().catch(function (err) {
      console.error(label + ' 取得失敗:', err);
      toast(label + ' 取得失敗: ' + String(err && err.message ? err.message : err), 'warn');
      return null;
    });
  }

  /**
   * 工番コードを正規化する。
   * - 全角英数字 → 半角
   * - ハイフン系記号 → ASCII ハイフン
   * - 大文字に統一
   * - 前後の空白除去
   */
  function normalizeKobanCode(s) {
    if (s == null) return '';
    return String(s)
      .replace(/[Ａ-Ｚａ-ｚ０-９]/g, function (c) {
        return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
      })
      .replace(/[ー－―]/g, '-')
      .toUpperCase()
      .trim();
  }

  // ════════════════════════════════════════════════════════════════
  // B. Store（アプリ状態）
  // ════════════════════════════════════════════════════════════════

  var Store = {
    kobanList:    [],
    calendarMap:  {},
    holidayNotes: {},
    calendar:     [],
    staff:        [],
    workTypes:    [],
    schedules:    [],
    reports:      {},
    mailLatest:   {},
    today:        toYMD(new Date()),
    viewDate:     toYMD(new Date()),
    prevWorkingDate: '',  // Issue 3: 社内カレンダー連動の前日（getPreviousWorkingDay）
    dayWidth:     64,
    ganttDays:    [],
    ganttStart:   '',
    ganttEnd:     '',

    kobanByCode: function (code) {
      var n = normalizeKobanCode(code);
      return (this.kobanList || []).find(function (k) {
        return normalizeKobanCode(k['工番']) === n;
      }) || null;
    },

    staffById: function (id) {
      return this.staff.find(function (s) { return s.id === id; }) || null;
    },

    BAR_COLORS: ['bar-clay', 'bar-plum', 'bar-ochre', 'bar-moss', 'bar-indigo', 'bar-burgundy', 'bar-stone'],
    kobanColor: function (code) {
      var n = normalizeKobanCode(code);
      var idx = this.kobanList.findIndex(function (k) {
        return normalizeKobanCode(k['工番']) === n;
      });
      if (idx < 0) return 'bar-stone';
      return this.BAR_COLORS[idx % this.BAR_COLORS.length];
    }
  };

  // ════════════════════════════════════════════════════════════════
  // C. 起動シーケンス
  // ════════════════════════════════════════════════════════════════

  document.addEventListener('DOMContentLoaded', function () {
    initControls();
    Heartbeat.init();
    loadAll();
  });

  /**
   * gasPromise: google.script.run を Promise でラップ
   */
  function gasPromise(fn, arg1, arg2) {
    return new Promise(function (res, rej) {
      var runner = google.script.run
        .withSuccessHandler(res)
        .withFailureHandler(rej);
      if (arg2 !== undefined) runner[fn](arg1, arg2);
      else if (arg1 !== undefined) runner[fn](arg1);
      else runner[fn]();
    });
  }

  /**
   * 起動時データ読み込み。
   * Phase 1: getMasterPayload + getActiveStaff + getWorkTypes + getSchedules を並列実行
   *          safeCall により部分失敗を吸収し、残りのデータで描画を続行する。
   *          getMasterPayload / getDailyReportsByDate が失敗した場合は 5 秒後に 1 回だけ自動再試行。
   * Phase 2: getDailyReports(date) 単発呼び出し（FIX-3: 全スタッフ一括取得）
   */
  function loadAll(isRetry) {
    var today = Store.today;
    var start = offsetDate(today, -30);
    var end   = offsetDate(today, 90);
    Store.ganttStart = start;
    Store.ganttEnd   = end;

    // Phase 1: マスタ / スタッフ / 作業種別 / スケジュール / 前営業日 を並列取得
    // safeCall で各 API の失敗を独立して吸収する（Promise.allSettled 相当）
    // Issue 3: getPreviousWorkingDay は社内カレンダー連動の「前日」を返す
    Promise.all([
      safeCall(function () { return gasPromise('getMasterPayload'); }, 'マスタ'),
      safeCall(function () { return gasPromise('getActiveStaff'); }, 'スタッフ'),
      safeCall(function () { return gasPromise('getWorkTypes'); }, '作業種別'),
      safeCall(function () { return gasPromise('getSchedules', start, end); }, 'スケジュール'),
      gasPromise('getPreviousWorkingDay', today).catch(function () { return offsetDate(today, -1); })
    ]).then(function (results) {
      var masterFailed = (results[0] === null);
      var master    = results[0] || {};
      var staff     = results[1] || [];
      var workTypes = results[2] || [];
      var schedules = results[3] || [];
      var prevDate  = results[4] || offsetDate(today, -1);

      Store.kobanList       = master.kobanList   || [];
      Store.calendarMap     = master.calendarMap || {};
      Store.calendar        = master.calendar    || [];
      Store.staff           = staff;
      Store.prevWorkingDate = prevDate;

      Store.holidayNotes = {};
      Store.calendar.forEach(function (c) {
        if (!c['備考']) return;
        var rawDate = c['日付'];
        var key = (rawDate instanceof Date)
          ? rawDate.toISOString().slice(0, 10)
          : String(rawDate).slice(0, 10);
        Store.holidayNotes[key] = c['備考'];
      });
      Store.workTypes   = workTypes;
      Store.schedules   = schedules;

      buildGanttDays();
      renderPageHeader();
      GanttView.render();
      GanttView.renderBars();

      // FIX-3: Phase 2 を全件一括取得に変更
      if (staff.length === 0) {
        Store.reports = {};
        Store.mailLatest = {};
        ReportView.render();
        // マスタ失敗 & 未リトライの場合は 5 秒後に再試行
        if (masterFailed && !isRetry) {
          setTimeout(function () { loadAll(true); }, 5000);
        }
        return;
      }

      return gasPromise('getDailyReportsByDate', today)
        .then(function (rows) {
          var rmap = {};
          (rows || []).forEach(function (r) {
            if (!rmap[r.staffId]) rmap[r.staffId] = [];
            rmap[r.staffId].push(r);
          });
          return { rmap: rmap, reportsFailed: false };
        })
        .catch(function () {
          // getDailyReportsByDate 失敗 → 個別取得にフォールバック
          toast('日報一括取得失敗。個別取得に切り替えます', 'warn');
          return Promise.all(staff.filter(isUiStaff).map(function (s) {
            return gasPromise('getDailyReports', s.id, today)
              .then(function (rows) { return { staffId: s.id, rows: rows || [] }; })
              .catch(function () { return { staffId: s.id, rows: [] }; });
          })).then(function (arr) {
            var rmap = {};
            arr.forEach(function (r) { rmap[r.staffId] = r.rows; });
            return { rmap: rmap, reportsFailed: true };
          });
        })
        .then(function (phase2) {
          Store.reports = phase2.rmap;
          // 旧: 7 名分の getLatestMailRequestFor を並列呼び出し（MailQueue シートを 7 回読む）
          // 新: 1 回の getLatestMailRequestsForDate でまとめて取得（MailQueue シートを 1 回読む）
          return Promise.all([
            Promise.resolve(phase2),
            safeCall(function () { return gasPromise('getLatestMailRequestsForDate', today); }, 'メール状態')
          ]);
        })
        .then(function (r) {
          var phase2 = r[0];
          var mailMap = r[1] || {};
          var mmap = {};
          staff.filter(isUiStaff).forEach(function (s) { mmap[s.id] = mailMap[s.id] || null; });
          Store.mailLatest = mmap;
          ReportView.render();
          lsSave('reports_' + today, Store.reports);
          // マスタまたは日報が失敗 & 未リトライの場合は 5 秒後に再試行
          if ((masterFailed || phase2.reportsFailed) && !isRetry) {
            setTimeout(function () { loadAll(true); }, 5000);
          }
        });

    }).catch(function (err) {
      console.error('loadAll 予期せぬエラー:', err);
      toast('データの読み込みに失敗しました: ' + String(err && err.message ? err.message : err), 'err');
      var cached = lsLoad('reports_' + Store.today);
      if (cached) {
        Store.reports = cached;
        ReportView.render();
      }
      // 未リトライの場合は 5 秒後に再試行
      if (!isRetry) {
        setTimeout(function () { loadAll(true); }, 5000);
      }
    });
  }

  /**
   * 日付変更時に日報・最新メール状態を再取得して再描画する。
   * FIX-3: 全件一括取得 + fallback パターンを共通化
   */
  function getDailyReportsForDate(date) {
    if (!Store.staff.length) return;

    gasPromise('getDailyReportsByDate', date)
      .then(function (rows) {
        var rmap = {};
        (rows || []).forEach(function (r) {
          if (!rmap[r.staffId]) rmap[r.staffId] = [];
          rmap[r.staffId].push(r);
        });
        return rmap;
      })
      .catch(function () {
        return Promise.all(Store.staff.filter(isUiStaff).map(function (s) {
          return gasPromise('getDailyReports', s.id, date)
            .then(function (rows) { return { staffId: s.id, rows: rows || [] }; })
            .catch(function () { return { staffId: s.id, rows: [] }; });
        })).then(function (arr) {
          var rmap = {};
          arr.forEach(function (r) { rmap[r.staffId] = r.rows; });
          return rmap;
        });
      })
      .then(function (rmap) {
        Store.reports = rmap;
        // 旧: 7 名分の getLatestMailRequestFor を並列呼び出し（MailQueue シートを 7 回読む）
        // 新: 1 回の getLatestMailRequestsForDate でまとめて取得（MailQueue シートを 1 回読む）
        return safeCall(function () { return gasPromise('getLatestMailRequestsForDate', date); }, 'メール状態');
      })
      .then(function (mailMap) {
        var mmap = {};
        Store.staff.filter(isUiStaff).forEach(function (s) { mmap[s.id] = (mailMap || {})[s.id] || null; });
        Store.mailLatest = mmap;
        ReportView.render();
      });
  }

  // ════════════════════════════════════════════════════════════════
  // D. 日付ユーティリティ
  // ════════════════════════════════════════════════════════════════

  function offsetDate(ymd, days) {
    var d = parseDate(ymd);
    d.setDate(d.getDate() + days);
    return toYMD(d);
  }

  function buildGanttDays() {
    var days = [];
    var cur = parseDate(Store.ganttStart);
    var end = parseDate(Store.ganttEnd);
    while (cur <= end) {
      var ds = toYMD(cur);
      var dow = cur.getDay();
      var cal = Store.calendarMap[ds] || null;
      var isWeekend = (dow === 0 || dow === 6) && cal !== '出勤土曜';
      var isWorkSat = cal === '出勤土曜';
      var holidayName = Store.holidayNotes[ds] || ((cal === '祝日' || cal === '休日') ? cal : '');
      days.push({
        dateStr:     ds,
        dow:         dow,
        dowJa:       DOW_JA[dow],
        isToday:     ds === Store.today,
        isWeekend:   isWeekend,
        isWorkSat:   isWorkSat,
        holidayName: holidayName
      });
      cur.setDate(cur.getDate() + 1);
    }
    Store.ganttDays = days;
  }

  /** ガント列インデックス（0-indexed）を返す */
  function dayIndex(dateStr) {
    return Store.ganttDays.findIndex(function (d) { return d.dateStr === dateStr; });
  }

  // ════════════════════════════════════════════════════════════════
  // E. ページヘッダ・凡例
  // ════════════════════════════════════════════════════════════════

  function renderPageHeader() {
    var d = parseDate(Store.today);
    var year = d.getFullYear();
    var month = d.getMonth() + 1;
    var day   = d.getDate();
    var dow   = DOW_JA[d.getDay()];
    var label = year + '年' + month + '月' + day + '日（' + dow + '）';

    var el = document.getElementById('page-date-eyebrow');
    if (el) el.textContent = label;
  }

  // 凡例（kobanList の上位 N 件を色見本表示）はマイナス思考で削除済み。
  // 工番選択時の swatch 色は各バー / 各日報行のカラーバーで個別に示すので
  // ヘッダ近くの集約表示は冗長だった。renderGanttLegend は撤去。

  // ════════════════════════════════════════════════════════════════
  // F. GanttView
  // ════════════════════════════════════════════════════════════════

  var GanttView = {
    dayWidth: 64,

    render: function () {
      var dw = Store.dayWidth;
      this.dayWidth = dw;
      this._renderHeaders();
      this._renderStaffRows();
      this._scrollToToday();
    },

    _renderHeaders: function () {
      var dw = this.dayWidth;
      var days = Store.ganttDays;
      var n    = days.length;
      var grid = document.getElementById('gantt-days-grid');
      if (!grid) return;

      var staffCount = Store.staff.filter(isUiStaff).length;
      grid.style.gridTemplateColumns = 'repeat(' + n + ', ' + dw + 'px)';
      // Issue 9: 行高を auto にして lane を動的に増やせるよう grid-template-rows を除去
      grid.style.gridTemplateRows    = '32px 32px repeat(' + Math.max(staffCount, 1) + ', auto)';

      var months = [];
      var curMonth = '';
      var curStart = 1;
      days.forEach(function (d, i) {
        var ym = d.dateStr.slice(0, 7);
        if (ym !== curMonth) {
          if (curMonth) months.push({ label: curMonth, start: curStart, span: i - curStart + 1 });
          curMonth = ym;
          curStart = i + 1;
        }
      });
      if (curMonth) months.push({ label: curMonth, start: curStart, span: n - curStart + 1 });

      var html = '';

      months.forEach(function (m) {
        var parts = m.label.split('-');
        var label = parts[0] + '年 ' + (+parts[1]) + '月';
        html += '<div class="gantt-month" style="grid-column:' + m.start + ' / span ' + m.span + ';">' + label + '</div>';
      });

      days.forEach(function (d, i) {
        var cls = 'gantt-day-head';
        if (d.isToday)   cls += ' today';
        else if (d.isWeekend) cls += ' weekend';
        var dowCls = '';
        if (d.dow === 6 && !d.isWorkSat) dowCls = 'sat';
        else if (d.dow === 0) dowCls = 'sun';
        if (dowCls) cls += ' ' + dowCls;

        var badge = d.isWorkSat ? '<span class="badge-worksat">出勤</span>' : '';
        var tooltipAttr = d.holidayName ? ' title="' + escAttr(d.holidayName) + '"' : '';

        html += '<div class="' + cls + '"' + tooltipAttr + '>';
        html += '<span class="dnum">' + (+d.dateStr.slice(8)) + '</span>';
        html += '<span class="dow">' + d.dowJa + '</span>';
        if (badge) html += badge;
        html += '</div>';
      });

      grid.innerHTML = html;
      this._appendStaffRowCells(grid);
    },

    _appendStaffRowCells: function (grid) {
      var dw   = this.dayWidth;
      var days = Store.ganttDays;
      var n    = days.length;

      Store.staff.filter(isUiStaff).forEach(function (s, rowIdx) {
        var gridRow = rowIdx + 3;
        var rowDiv = document.createElement('div');
        // Issue 9: min-height:56px で最低高さを保証しつつ auto で伸縮
        rowDiv.style.cssText = 'grid-row:' + gridRow + '; grid-column:1 / span ' + n + '; position:relative; border-bottom:1px solid var(--line); min-height:56px;';
        rowDiv.style.background = (rowIdx % 2 === 1) ? 'var(--bg-row)' : 'transparent';
        rowDiv.dataset.staffId = s.id;
        rowDiv.dataset.rowIdx  = rowIdx;
        rowDiv.classList.add('gantt-row');

        var cellsDiv = document.createElement('div');
        cellsDiv.style.cssText = 'position:absolute; inset:0; display:grid; grid-template-columns:repeat(' + n + ', ' + dw + 'px);';
        days.forEach(function (d) {
          var cell = document.createElement('div');
          cell.className = 'gantt-cell' + (d.isWeekend ? ' weekend' : '') + (d.isToday ? ' today' : '');
          cellsDiv.appendChild(cell);
        });
        rowDiv.appendChild(cellsDiv);

        var overlay = document.createElement('div');
        overlay.className = 'gantt-row-overlay';
        overlay.dataset.staffId = s.id;
        DragCreate.attachOverlay(overlay);
        rowDiv.appendChild(overlay);

        grid.appendChild(rowDiv);
      });
    },

    _renderStaffRows: function () {
      var staffCol = document.getElementById('gantt-staff-col');
      if (!staffCol) return;

      var header = staffCol.querySelector('.staff-cell.header');
      staffCol.innerHTML = '';
      if (header) staffCol.appendChild(header);
      else {
        var h = document.createElement('div');
        h.className = 'staff-cell header';
        h.style.height = '64px';
        h.textContent = 'スタッフ';
        staffCol.appendChild(h);
      }

      Store.staff.filter(isUiStaff).forEach(function (s, i) {
        var avClass = 'av-' + ((i % 7) + 1);
        var isLast  = (i === Store.staff.filter(isUiStaff).length - 1);
        var cell = document.createElement('div');
        cell.className = 'staff-cell';
        // Issue 9: スタッフ列行高も min-height:56px + auto で伸縮
        cell.style.height = 'auto';
        cell.style.minHeight = '56px';
        if (isLast) cell.style.borderBottom = 'none';
        var initial = s.name ? esc(s.name.charAt(0)) : '?';
        var noText  = (i % 7 === 2) ? '' : 'text-white';
        cell.innerHTML =
          '<div class="avatar ' + avClass + ' ' + noText + '">' + initial + '</div>' +
          '<div class="name"><span>' + esc(s.name) + '</span><span class="email mono">' + esc((s.email || '').split('@')[0]) + '</span></div>';
        staffCol.appendChild(cell);
      });
    },

    _scrollToToday: function () {
      var container = document.getElementById('gantt-scroll-container');
      if (!container) return;
      var todayIdx = dayIndex(Store.today);
      if (todayIdx < 0) return;
      var scrollLeft = todayIdx * this.dayWidth - container.clientWidth / 2 + this.dayWidth / 2;
      container.scrollLeft = Math.max(0, scrollLeft);
    },

    renderBars: function () {
      document.querySelectorAll('.gantt-bar').forEach(function (b) { b.remove(); });

      // Issue 9: スタッフごとに lane 使用状況を追跡し、上限なしで描画
      // laneMap[staffIdx][dateStr] = 使用済み lane 番号配列
      var laneMap = {};

      var uiStaff = Store.staff.filter(isUiStaff);
      Store.schedules.forEach(function (sch) {
        var staffIdx = uiStaff.findIndex(function (s) { return s.id === sch.staffId; });
        if (staffIdx < 0) return;

        var startIdx = dayIndex(sch.startDate);
        var endIdx   = dayIndex(sch.endDate);
        if (startIdx < 0 && endIdx < 0) return;
        startIdx = Math.max(0, startIdx < 0 ? 0 : startIdx);
        endIdx   = Math.min(Store.ganttDays.length - 1, endIdx < 0 ? Store.ganttDays.length - 1 : endIdx);
        if (startIdx > endIdx) return;

        // Issue 9: 空き lane を探す（衝突回避）
        if (!laneMap[staffIdx]) laneMap[staffIdx] = {};
        var lane = 0;
        var occupied = true;
        while (occupied) {
          occupied = false;
          for (var di = startIdx; di <= endIdx; di++) {
            var dk = Store.ganttDays[di].dateStr;
            if (!laneMap[staffIdx][dk]) laneMap[staffIdx][dk] = [];
            if (laneMap[staffIdx][dk].indexOf(lane) !== -1) {
              occupied = true;
              break;
            }
          }
          if (occupied) lane++;
        }
        // lane を予約
        for (var di2 = startIdx; di2 <= endIdx; di2++) {
          var dk2 = Store.ganttDays[di2].dateStr;
          if (!laneMap[staffIdx][dk2]) laneMap[staffIdx][dk2] = [];
          laneMap[staffIdx][dk2].push(lane);
        }

        var dw     = GanttView.dayWidth;
        var laneH  = 28; // lane 1件あたりの高さ
        var topOff = 4 + lane * (laneH + 4);
        var left   = startIdx * dw + 4;
        var width  = (endIdx - startIdx + 1) * dw - 8;

        var barClass = sch.kobanCode ? Store.kobanColor(sch.kobanCode) : 'bar-stone';

        var koban  = sch.kobanCode || '';
        var master = Store.kobanByCode(koban);
        var client = master ? (master['受注先'] || '') : '';
        var wt = Store.workTypes.find(function (w) { return w.id === sch.workTypeId; });
        var wtName = wt ? wt.name : (sch.note || '');
        var label = [koban, client, wtName].filter(Boolean).join(' · ');

        var bar = document.createElement('div');
        bar.className = 'gantt-bar ' + barClass;
        bar.style.left   = left + 'px';
        bar.style.width  = width + 'px';
        bar.style.top    = topOff + 'px';
        bar.style.bottom = 'auto';
        bar.style.height = laneH + 'px';
        bar.textContent = label;
        bar.dataset.id  = sch.id;

        DragMove.attach(bar, sch);

        var lh = document.createElement('div');
        lh.className = 'resize-handle left';
        lh.addEventListener('mousedown', function (e) { DragResize.start(e, bar, sch, 'left'); });
        bar.appendChild(lh);

        var rh = document.createElement('div');
        rh.className = 'resize-handle right';
        rh.addEventListener('mousedown', function (e) { DragResize.start(e, bar, sch, 'right'); });
        bar.appendChild(rh);

        if (master && master['納入先住所']) {
          bar.title = master['納入先住所'];
        }

        var rowGrid = document.getElementById('gantt-days-grid');
        if (!rowGrid) return;
        var rows = rowGrid.querySelectorAll('.gantt-row');
        if (rows[staffIdx]) {
          rows[staffIdx].appendChild(bar);
          // Issue 9: 行高を lane 数に合わせて動的拡張
          var neededH = topOff + laneH + 8;
          var curH = parseInt(rows[staffIdx].style.minHeight) || 56;
          if (neededH > curH) {
            rows[staffIdx].style.minHeight = neededH + 'px';
            // スタッフ列の対応行も同じ高さに
            var staffCol = document.getElementById('gantt-staff-col');
            if (staffCol) {
              var staffCells = staffCol.querySelectorAll('.staff-cell:not(.header)');
              if (staffCells[staffIdx]) {
                staffCells[staffIdx].style.minHeight = neededH + 'px';
              }
            }
          }
        }
      });
    }
  };

  // ════════════════════════════════════════════════════════════════
  // G. ドラッグ操作
  // ════════════════════════════════════════════════════════════════

  var DragCreate = {
    attachOverlay: function (overlay) {
      var startX = 0, ghost = null, startCol = 0;

      function onMove(e) {
        if (!ghost) return;
        var rect    = overlay.getBoundingClientRect();
        var curCol  = Math.max(startCol, Math.floor((e.clientX - rect.left) / GanttView.dayWidth));
        var left    = startCol * GanttView.dayWidth + 4;
        var width   = (curCol - startCol + 1) * GanttView.dayWidth - 8;
        ghost.style.left  = left + 'px';
        ghost.style.width = width + 'px';
      }

      function onUp(e) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (!ghost) return;
        var rect   = overlay.getBoundingClientRect();
        var endCol = Math.max(startCol, Math.floor((e.clientX - rect.left) / GanttView.dayWidth));
        ghost.remove();
        ghost = null;

        var startDate = Store.ganttDays[startCol] ? Store.ganttDays[startCol].dateStr : null;
        var endDate   = Store.ganttDays[endCol]   ? Store.ganttDays[endCol].dateStr   : null;
        if (!startDate || !endDate) return;

        var staffId = overlay.dataset.staffId;
        GanttEditModal.open({
          id:        '',
          staffId:   staffId,
          startDate: startDate,
          endDate:   endDate,
          kobanCode: '',
          workTypeId: '',
          note:      ''
        });
      }

      overlay.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        e.preventDefault();
        startX   = e.clientX;
        startCol = Math.floor((e.clientX - overlay.getBoundingClientRect().left) / GanttView.dayWidth);
        ghost = document.createElement('div');
        ghost.className = 'gantt-drag-ghost bar-clay';
        ghost.style.left  = (startCol * GanttView.dayWidth + 4) + 'px';
        ghost.style.width = (GanttView.dayWidth - 8) + 'px';
        overlay.parentNode.appendChild(ghost);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
  };

  var DragMove = {
    attach: function (bar, sch) {
      var startX = 0, origLeft = 0;
      var dragging = false;
      var hasMoved = false;
      var origStartDate = '', origEndDate = '';

      function onMove(e) {
        var delta = e.clientX - startX;
        // 5px 超えたらドラッグ開始とみなす
        if (!hasMoved && Math.abs(delta) < 5) return;
        if (!hasMoved) {
          hasMoved = true;
          dragging = true;
          bar.style.opacity = '0.8';
        }
        bar.style.left = (origLeft + delta) + 'px';
      }

      function onUp(e) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        bar.style.opacity = '';
        bar.style.zIndex  = '';

        if (!hasMoved) {
          // ドラッグなし = クリックとみなしてモーダルを開く
          dragging = false;
          hasMoved = false;
          GanttEditModal.open(sch);
          return;
        }

        dragging = false;
        hasMoved = false;

        var newLeft = parseInt(bar.style.left);
        var colDelta = Math.round((newLeft - origLeft) / GanttView.dayWidth);
        if (colDelta === 0) {
          GanttView.renderBars();
          return;
        }

        var startD = parseDate(sch.startDate);
        var endD   = parseDate(sch.endDate);
        startD.setDate(startD.getDate() + colDelta);
        endD.setDate(endD.getDate() + colDelta);
        var newStart = toYMD(startD);
        var newEnd   = toYMD(endD);

        sch.startDate = newStart;
        sch.endDate   = newEnd;
        GanttView.renderBars();

        var savedOrigStart = origStartDate;
        var savedOrigEnd   = origEndDate;
        google.script.run
          .withFailureHandler(function (err) {
            toast('移動の保存に失敗しました: ' + String(err.message || err), 'err');
            sch.startDate = savedOrigStart;
            sch.endDate   = savedOrigEnd;
            GanttView.renderBars();
          })
          .updateSchedule(sch.id, { startDate: newStart, endDate: newEnd });
      }

      bar.addEventListener('mousedown', function (e) {
        if (e.target.classList.contains('resize-handle')) return;
        if (e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        hasMoved = false;
        dragging = false;
        startX        = e.clientX;
        origLeft      = parseInt(bar.style.left);
        origStartDate = sch.startDate;
        origEndDate   = sch.endDate;
        bar.style.zIndex  = '20';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
  };

  var DragResize = {
    start: function (e, bar, sch, side) {
      e.preventDefault();
      e.stopPropagation();
      var startX        = e.clientX;
      var origLeft      = parseInt(bar.style.left);
      var origWidth     = parseInt(bar.style.width);
      var origStartDate = sch.startDate;
      var origEndDate   = sch.endDate;

      function onMove(ev) {
        var delta = ev.clientX - startX;
        if (side === 'right') {
          bar.style.width = Math.max(GanttView.dayWidth, origWidth + delta) + 'px';
        } else {
          var newLeft  = origLeft + delta;
          var newWidth = origWidth - delta;
          if (newWidth < GanttView.dayWidth) return;
          bar.style.left  = newLeft + 'px';
          bar.style.width = newWidth + 'px';
        }
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);

        var startCol = Math.round(parseInt(bar.style.left) / GanttView.dayWidth);
        var span     = Math.round(parseInt(bar.style.width) / GanttView.dayWidth);
        var endCol   = startCol + span - 1;

        var newStart = Store.ganttDays[startCol] ? Store.ganttDays[startCol].dateStr : sch.startDate;
        var newEnd   = Store.ganttDays[endCol]   ? Store.ganttDays[endCol].dateStr   : sch.endDate;

        sch.startDate = newStart;
        sch.endDate   = newEnd;
        GanttView.renderBars();

        google.script.run
          .withFailureHandler(function (err) {
            toast('リサイズの保存に失敗: ' + String(err.message || err), 'err');
            sch.startDate = origStartDate;
            sch.endDate   = origEndDate;
            GanttView.renderBars();
          })
          .updateSchedule(sch.id, { startDate: newStart, endDate: newEnd });
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
  };

  // ════════════════════════════════════════════════════════════════
  // H. ガント編集モーダル
  // ════════════════════════════════════════════════════════════════

  var GanttEditModal = {
    current: null,

    open: function (sch) {
      this.current = sch;
      var modal = document.getElementById('gantt-edit-modal');
      if (!modal) return;

      document.getElementById('ge-id').value       = sch.id || '';
      document.getElementById('ge-staff-id').value = sch.staffId || '';
      document.getElementById('ge-start').value    = sch.startDate || '';
      document.getElementById('ge-end').value      = sch.endDate || '';
      document.getElementById('ge-note').value     = sch.note || '';

      // C: datalist パターンで工番検索コンボボックスを構築
      var kobanDl = document.getElementById('ge-koban-datalist');
      if (kobanDl) {
        kobanDl.innerHTML = '<option value="（一般作業）">（一般作業）</option>' +
          Store.kobanList.map(function (k) {
            // value に「工番コード  受注先  品名」を連結して全フィールド検索を可能にする
            var display = k['工番'] + (k['受注先'] ? '  ' + k['受注先'] : '') + (k['品名'] ? '  ' + k['品名'] : '');
            return '<option value="' + escAttr(display) + '"></option>';
          }).join('');
      }
      var kobanInput = document.getElementById('ge-koban-input');
      if (kobanInput) {
        // 既存の kobanCode から表示テキストを復元する
        if (sch.kobanCode) {
          var existingMaster = Store.kobanByCode(sch.kobanCode);
          if (existingMaster) {
            kobanInput.value = sch.kobanCode + (existingMaster['受注先'] ? '  ' + existingMaster['受注先'] : '') + (existingMaster['品名'] ? '  ' + existingMaster['品名'] : '');
          } else {
            kobanInput.value = sch.kobanCode;
          }
        } else {
          // 新規追加: 既定は空（ユーザーに選択を促す）
          kobanInput.value = '';
        }
        this._updateKobanInfo(sch.kobanCode);
      }

      var sel = document.getElementById('ge-worktype');
      if (sel) {
        sel.innerHTML = '<option value="">選択…</option>' +
          Store.workTypes.map(function (w) {
            return '<option value="' + escAttr(w.id) + '"' + (w.id === sch.workTypeId ? ' selected' : '') + '>' + esc(w.name) + '</option>';
          }).join('');
      }

      var delBtn = document.getElementById('ge-delete');
      if (delBtn) delBtn.style.display = sch.id ? 'inline-block' : 'none';

      var titleEl = document.getElementById('gantt-modal-title');
      if (titleEl) titleEl.textContent = sch.id ? 'スケジュール編集' : 'スケジュール追加';

      modal.classList.add('open');
      trapFocus(modal);
    },

    close: function () {
      var modal = document.getElementById('gantt-edit-modal');
      if (modal) modal.classList.remove('open');
      this.current = null;
    },

    save: function () {
      var id      = document.getElementById('ge-id').value;
      var staffId = document.getElementById('ge-staff-id').value;
      // C: ge-koban-input (datalist) から工番コードを抽出
      var kobanInput = document.getElementById('ge-koban-input');
      var kobanRaw   = kobanInput ? kobanInput.value.trim() : '';
      var koban      = GanttEditModal._extractKobanCode(kobanRaw);
      var wt      = document.getElementById('ge-worktype').value;
      var start   = document.getElementById('ge-start').value;
      var end     = document.getElementById('ge-end').value;
      var note    = document.getElementById('ge-note').value;

      if (!start || !end) { toast('開始日・終了日を入力してください', 'warn'); return; }
      if (start > end)    { toast('開始日は終了日以前にしてください', 'warn'); return; }

      var record = {
        staffId:    staffId,
        startDate:  start,
        endDate:    end,
        kobanCode:  koban,
        workTypeId: wt,
        note:       note
      };

      if (id) {
        var existing = Store.schedules.find(function (s) { return s.id === id; });
        if (existing) Object.assign(existing, record);
        GanttView.renderBars();
        this.close();

        google.script.run
          .withSuccessHandler(function () { toast('スケジュールを更新しました', 'ok'); })
          .withFailureHandler(function (err) { toast('更新失敗: ' + String(err.message || err), 'err'); })
          .updateSchedule(id, record);
      } else {
        var newId = 'sch_' + (window.crypto && crypto.randomUUID
          ? crypto.randomUUID().replace(/-/g, '').substring(0, 16)
          : Math.random().toString(36).substring(2, 18));
        record.id = newId;

        Store.schedules.push(record);
        GanttView.renderBars();

        // 今日を含む場合はローカルで即時日報追加（サーバー応答を待たない）
        var today = Store.today;
        if (record.startDate <= today && record.endDate >= today) {
          ReportView.autoAddReportRow(record.staffId, newId, record);
        }

        this.close();

        google.script.run
          .withSuccessHandler(function (serverId) {
            // FIX-7: createSchedule の戻り値は生成済み id 文字列
            if (serverId && serverId !== newId) {
              var existing2 = Store.schedules.find(function (s) { return s.id === newId; });
              if (existing2) existing2.id = serverId;
              // 日報の linkedScheduleId も更新
              Object.keys(Store.reports || {}).forEach(function (sid) {
                (Store.reports[sid] || []).forEach(function (r) {
                  if (r.linkedScheduleId === newId) r.linkedScheduleId = serverId;
                });
              });
            }
            GanttView.renderBars();
            toast('スケジュールを追加しました', 'ok');
          })
          .withFailureHandler(function (err) {
            toast('追加失敗: ' + String(err.message || err), 'err');
            Store.schedules = Store.schedules.filter(function (s) { return s.id !== newId; });
            // 追加した日報行もロールバック
            Object.keys(Store.reports || {}).forEach(function (sid) {
              Store.reports[sid] = (Store.reports[sid] || []).filter(function (r) {
                return r.linkedScheduleId !== newId;
              });
            });
            GanttView.renderBars();
            ReportView.render();
          })
          .createSchedule(record);
      }
    },

    del: function () {
      var id = document.getElementById('ge-id').value;
      if (!id) return;
      if (!confirm('このスケジュールを削除しますか？関連する業務報告行も同時に削除されます。')) return;

      // ローカル: スケジュール除外
      Store.schedules = (Store.schedules || []).filter(function (s) { return s.id !== id; });
      // ローカル: 関連日報除外（全スタッフ横断）
      Object.keys(Store.reports || {}).forEach(function (sid) {
        Store.reports[sid] = (Store.reports[sid] || []).filter(function (r) {
          return String(r.linkedScheduleId || '') !== String(id);
        });
      });
      GanttView.renderBars();
      ReportView.render();
      GanttEditModal.close();

      // サーバ: ガント削除
      google.script.run
        .withFailureHandler(function (err) { toast('削除失敗: ' + String(err.message || err), 'err'); })
        .deleteSchedule(id);

      // サーバ: 関連日報削除（連動）
      google.script.run
        .withSuccessHandler(function (deletedCount) {
          if (deletedCount > 0) {
            toast('削除しました（関連日報 ' + deletedCount + ' 件も削除）');
          } else {
            toast('削除しました');
          }
        })
        .withFailureHandler(function (err) {
          toast('日報連動削除失敗: ' + String(err.message || err), 'err');
        })
        .deleteDailyReportsByScheduleId(id);
    },

    _updateKobanInfo: function (code) {
      var info = document.getElementById('ge-koban-info');
      if (!info) return;
      if (!code) { info.textContent = ''; return; }
      var m = Store.kobanByCode(code);
      if (m) {
        info.textContent = '受注先: ' + (m['受注先'] || '—') + ' / 納入先: ' + (m['納入先'] || '—') + ' / ' + (m['品名'] || '');
      } else {
        info.textContent = '';
      }
    },

    // C: datalist の value（「工番コード  受注先  品名」形式）から先頭の工番コードを抽出
    _extractKobanCode: function (val) {
      if (!val || val === '（一般作業）') return '';
      // 先頭のトークンを取り出して正規化（全角・大小文字を吸収）
      var raw  = String(val).split(/\s+/)[0].trim();
      var code = normalizeKobanCode(raw);
      if (!code || code === '（一般作業）') return '';
      // マスタに存在するか確認（不正入力を除外）
      var found = Store.kobanList.find(function (k) {
        return normalizeKobanCode(k['工番']) === code;
      });
      if (!found && code) {
        // マスタに無い工番が入力された場合、ガントモーダルの info 欄に警告を出す
        var info = document.getElementById('ge-koban-info');
        if (info) info.textContent = '⚠ マスタに存在しない工番です';
      }
      return found ? found['工番'] : '';
    }
  };

  // ════════════════════════════════════════════════════════════════
  // I. ReportView（日報カード描画）
  // ════════════════════════════════════════════════════════════════

  // Issue 4: duration 選択肢
  var DURATION_OPTIONS = ['2時間', '3時間', '半日（午前）', '半日（午後）', '1日', '2日', '3日', '1週間'];

  /**
   * duration 文字列から日数（整数）を返す。
   * "2日" → 2, "3日" → 3, その他 → 1
   */
  function parseDurationDays(dur) {
    if (!dur) return 1;
    var m = String(dur).match(/^(\d+)日/);
    if (m) return Math.max(1, parseInt(m[1], 10));
    if (dur === '1週間') return 7;
    return 1;
  }

  var ReportView = {
    render: function () {
      var grid = document.getElementById('report-cards-grid');
      if (!grid) return;
      // Issue 2: 全員縦スタック（1列）で描画（external ロールは非表示）
      grid.innerHTML = Store.staff.filter(isUiStaff).map(function (s, i) {
        return ReportView._buildCard(s, i);
      }).join('');

      Store.staff.filter(isUiStaff).forEach(function (s) {
        ReportView._attachCardHandlers(s);
      });

      lsSave('reports_' + Store.today, Store.reports);
    },

    /**
     * ガント追加後、今日の日報行を自動生成して再描画する
     */
    autoAddReportRow: function (staffId, scheduleId, sch) {
      if (!Store.reports[staffId]) Store.reports[staffId] = [];

      var already = Store.reports[staffId].some(function (r) {
        return r.linkedScheduleId === scheduleId;
      });
      if (already) return;

      var wt = Store.workTypes.find(function (w) { return w.id === sch.workTypeId; });
      var wtName = wt ? wt.name : (sch.note || '');

      // CRITICAL FIX: detail を Backend スキーマに合わせて設定
      var detailText = sch.note || wtName || '';
      var newRow = {
        staffId:          staffId,
        reportDate:       Store.today,
        section:          'today',
        seq:              Date.now(),
        kobanCode:        sch.kobanCode || '',
        workTypeId:       sch.workTypeId || '',
        detail:           detailText,         // ★ Backend スキーマ準拠
        duration:         '',
        continued:        false,        // FIX-A/C: boolean で統一
        periodStart:      sch.startDate,
        periodEnd:        sch.endDate,
        linkedScheduleId: scheduleId,
        // Store 表示用
        workTypeName:     wtName,
        note:             detailText,
        dateRange:        Store.today.slice(5).replace('-', '/')
      };

      Store.reports[staffId].push(newRow);
      ReportView.render();

      // FIX-7: 即時保存（debounce なし）
      SaveQueue.flushNow(newRow);
    },

    _buildCard: function (s, idx) {
      var avClass  = 'av-' + ((idx % 7) + 1);
      var noText   = (idx % 7 === 2) ? '' : ' text-white';
      var initial  = s.name ? s.name.charAt(0) : '?';
      var reports  = Store.reports[s.id] || [];
      var today    = Store.today;

      var todayReps = reports.filter(function (r) { return r.reportDate === today && r.section === 'today'; });
      var prevReps  = reports.filter(function (r) { return r.section === 'prev' || r.section === 'yesterday'; });

      var mq = (Store.mailLatest && Store.mailLatest[s.id]) || null;
      var mailStatus = 'idle';
      if (mq && mq.status) {
        mailStatus = (mq.status === 'picked') ? 'pending' : mq.status;
      }

      var statusBadge = ReportView._statusBadge(mailStatus);
      var footerHtml  = ReportView._footerHtml(s, mailStatus, reports);

      // Issue 2: 各行は「期間 | 工番 | 作業内容 | 詳細 | 操作」のテーブル構造
      var todayRows = todayReps.map(function (r) {
        return ReportView._reportRow(r, true);
      }).join('');
      // Issue 6: 本日行に「📋 前日へコピー」ボタン付きの追加ボタン
      todayRows += '<div class="row-line row-add" data-staff-id="' + esc(s.id) + '" data-section="today"><span class="pill" style="font-size:12px;padding:3px 10px">+ 追加</span><span style="color:var(--txt-3)">クリックで作業内容を追加</span><span></span></div>';

      var prevRows = prevReps.map(function (r) {
        return ReportView._reportRow(r, false);
      }).join('');
      // Issue 6: 前日行に削除ボタン
      prevRows += '<div class="row-line row-add" data-staff-id="' + esc(s.id) + '" data-section="prev"><span class="pill" style="font-size:12px;padding:3px 10px">+ 追加</span><span style="color:var(--txt-3)">クリックで報告を追加</span><span></span></div>';

      var borderStyle = mailStatus === 'pending' ? ' style="border-color:rgba(184,134,42,0.5);"'
                      : mailStatus === 'failed'  ? ' style="border-color:rgba(161,59,42,0.45);"'
                      : '';

      return '<article class="panel rounded-xl overflow-hidden shadow-soft" id="report-card-' + esc(s.id) + '"' + borderStyle + '>' +
        '<header class="px-4 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--line)">' +
          '<div class="flex items-center gap-2.5">' +
            '<div class="w-8 h-8 rounded-full grid place-items-center text-[11px] font-semibold' + noText + ' ' + avClass + '">' + initial + '</div>' +
            '<div class="leading-tight">' +
              '<div class="text-[13.5px] font-semibold">' + esc(s.name) + '</div>' +
              '<div class="text-[10.5px] mono" style="color:var(--txt-3)">' + esc(s.email || '') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="flex items-center gap-2">' +
            '<button class="btn-ai-assist" data-staff-id="' + escAttr(s.id) + '" style="font-size:11px;padding:3px 8px;border:1px solid var(--line-2);border-radius:5px;background:var(--bg-panel);color:var(--txt-2);cursor:pointer;">✨ AI 補助</button>' +
            statusBadge +
          '</div>' +
        '</header>' +
        '<div class="px-4 py-3" style="min-width:0">' +
          '<div class="text-[11px] font-semibold mb-1.5" style="color:var(--txt-3)">本日の作業内容</div>' +
          '<div class="space-y-1" id="today-rows-' + esc(s.id) + '">' + todayRows + '</div>' +
          '<div class="text-[11px] font-semibold mt-3 mb-1.5" style="color:var(--txt-3)">前日までの報告' + (Store.prevWorkingDate ? '（〜' + Store.prevWorkingDate.slice(5).replace('-', '/') + '）' : '') + '</div>' +
          '<div class="space-y-1" id="prev-rows-' + esc(s.id) + '">' + prevRows + '</div>' +
        '</div>' +
        footerHtml +
        '</article>';
    },

    // Issue 2: 行構造を「期間 | 工番 | 作業内容 | 操作ボタン」に
    // Issue 6: isToday なら「📋 前日へコピー」、!isToday なら「継続/完了 + × 削除」
    _reportRow: function (r, isToday) {
      var durLabel = r.duration ? '<span class="pill" style="font-size:10px;padding:1px 6px">' + esc(r.duration) + '</span> ' : '';
      // Backend からロード時は dateRange が無いため periodStart/periodEnd または reportDate からフォールバック
      // Issue D: 期間表示を維持（periodStart/periodEnd がある場合は範囲表示）
      var fallbackDate = (r.reportDate || Store.today).toString().slice(5).replace('-', '/');
      var periodLabel;
      if (r.periodStart && r.periodEnd && r.periodStart !== r.periodEnd) {
        var ps = String(r.periodStart).slice(5).replace('-', '/');
        var pe = String(r.periodEnd).slice(5).replace('-', '/');
        periodLabel = ps + '〜' + pe;
      } else {
        periodLabel = r.dateRange || fallbackDate;
      }
      var pill = isToday
        ? '<span class="pill pill-accent">' + esc(periodLabel) + '</span>'
        : '<span class="pill">' + esc(periodLabel) + '</span>';
      // CRITICAL FIX: detail を最優先（Backend スキーマ列名）。workTypeId から workTypes マスタを引いて補完
      var wt = r.workTypeId ? Store.workTypes.find(function (w) { return w.id === r.workTypeId; }) : null;
      var wtNameRaw = r.detail || r.workTypeName || r.note || (wt ? wt.name : '');
      var wtName = esc(wtNameRaw);
      var barCls = r.kobanCode ? Store.kobanColor(r.kobanCode) : 'bar-stone';
      var swatch = '<span class="swatch ' + barCls + '"' + (isToday ? '' : ' style="opacity:.5"') + '></span>';
      // 工番マスタから受注先・品名を引き当て
      var kobanInfo = (r.kobanCode && Store.kobanList)
        ? Store.kobanList.find(function (k) { return k['工番'] === r.kobanCode; })
        : null;
      var customer    = kobanInfo ? (kobanInfo['受注先'] || '') : '';
      var productName = kobanInfo ? (kobanInfo['品名']   || '') : '';
      var kobanInfoTitle = escAttr([r.kobanCode, customer, productName].filter(Boolean).join(' '));

      // Issue 6/C: 操作ボタン
      var actionBtn = '';
      if (isToday) {
        // 「📋 前日へコピー」＋「× 削除」ボタン
        actionBtn = '<button class="btn-copy-prev" data-seq="' + escAttr(String(r.seq)) + '" data-staff-id="' + escAttr(r.staffId) + '" title="前日へコピー" style="font-size:10px;padding:2px 6px;border:1px solid var(--line-2);border-radius:4px;background:var(--bg-panel);cursor:pointer;color:var(--txt-2)">📋</button>' +
          '<button class="btn-del-today-row" data-seq="' + escAttr(String(r.seq)) + '" data-staff-id="' + escAttr(r.staffId) + '" title="削除" style="font-size:10px;padding:2px 6px;border:1px solid rgba(161,59,42,.3);border-radius:4px;background:var(--bg-panel);cursor:pointer;color:var(--err)">×</button>';
      } else {
        // Issue C: 継続/完了セレクト（continued フィールド）
        var isContinued = (r.continued === true || r.continued === 'true' || r.continued === 'TRUE');
        var statusSel = '<select class="sel-continued" data-seq="' + escAttr(String(r.seq)) + '" data-staff-id="' + escAttr(r.staffId) + '" style="font-size:10px;padding:1px 4px;border:1px solid var(--line-2);border-radius:4px;background:var(--bg-panel);color:var(--txt-1);cursor:pointer;">' +
          '<option value="false"' + (isContinued ? '' : ' selected') + '>完了</option>' +
          '<option value="true"'  + (isContinued ? ' selected' : '') + '>継続</option>' +
          '</select>';
        // 「↑ 本日へコピー」＋「× 削除」ボタン
        actionBtn = statusSel + '<button class="btn-copy-to-today-row" data-seq="' + escAttr(String(r.seq)) + '" title="本日へコピー" style="font-size:10px;padding:2px 6px;border:1px solid var(--line-2);border-radius:4px;background:var(--bg-panel);cursor:pointer;color:var(--txt-2)">↑</button>' +
          '<button class="btn-del-row" data-seq="' + escAttr(String(r.seq)) + '" data-staff-id="' + escAttr(r.staffId) + '" title="削除" style="font-size:10px;padding:2px 6px;border:1px solid rgba(161,59,42,.3);border-radius:4px;background:var(--bg-panel);cursor:pointer;color:var(--err)">×</button>';
      }

      // 工番情報行（工番がある場合のみ表示）
      var kobanLineHtml = '';
      if (r.kobanCode) {
        var kobanText = esc(r.kobanCode) + (customer ? ' ' + esc(customer) : '') + (productName ? ' ' + esc(productName) : '');
        kobanLineHtml = '<span class="row-koban-info" title="' + kobanInfoTitle + '">' + kobanText + '</span>';
      }
      // 作業内容行（duration + 作業名）
      var workLineHtml = '<span class="row-work-info">' + durLabel + wtName + '</span>';

      return '<div class="row-line">' +
        '<span class="flex-shrink-0">' + pill + '</span>' +
        '<span class="row-content">' + kobanLineHtml + workLineHtml + '</span>' +
        '<span class="flex items-center gap-1">' + swatch + actionBtn + '</span>' +
        '</div>';
    },

    _statusBadge: function (status) {
      var map = {
        'drafted': '<span class="badge badge-drafted">下書き作成済</span>',
        'sent':    '<span class="badge badge-sent">送信済</span>',
        'pending': '<span class="badge badge-pending">送信待ち</span>',
        'failed':  '<span class="badge badge-failed">送信失敗</span>',
        'idle':    '<span class="badge badge-idle">未送信</span>'
      };
      return map[status] || map['idle'];
    },

    _footerHtml: function (s, status, reports) {
      var mq = (Store.mailLatest && Store.mailLatest[s.id]) || null;
      var lastUpdated = '';
      if (mq) {
        lastUpdated = String(mq.processedAt || mq.createdAt || '').slice(11, 16);
      } else if (reports.length > 0) {
        lastUpdated = String(reports[0].updatedAt || '').slice(11, 16);
      }
      var footerLeft, footerBtn;

      if (status === 'sent') {
        footerLeft = '<span class="text-[11px]" style="color:var(--ok)">本日 <span class="mono">' + lastUpdated + '</span> に送信済</span>';
        footerBtn  = '<button class="btn-secondary text-xs" style="padding:6px 14px" data-action="resend" data-staff-id="' + s.id + '">再送する</button>';
      } else if (status === 'pending') {
        footerLeft = '<span class="text-[11px] flex items-center gap-1.5" style="color:var(--warn)"><span class="inline-block w-1.5 h-1.5 rounded-full" style="background:var(--warn); animation:pulse 1.6s infinite"></span>EXE が処理中</span>';
        footerBtn  = '<button class="btn-secondary text-xs" style="padding:6px 14px; opacity:.6" disabled>処理中…</button>';
      } else if (status === 'failed') {
        footerLeft = '<span class="text-[11px]" style="color:var(--err)">最終試行 <span class="mono">' + lastUpdated + '</span></span>';
        footerBtn  = '<button class="btn-accent text-xs" style="padding:6px 14px" data-action="resend" data-staff-id="' + s.id + '">再送する</button>';
      } else {
        footerLeft = '<span class="text-[11px]" style="color:var(--txt-3)">最終更新 <span class="mono">' + (lastUpdated || '—') + '</span></span>';
        footerBtn  = '<button class="btn-accent text-xs" style="padding:6px 14px" data-action="draft" data-staff-id="' + s.id + '">メール下書き作成</button>';
      }

      return '<footer class="px-4 py-2.5 flex items-center justify-between" style="border-top:1px solid var(--line); background:var(--bg-soft)">' +
        footerLeft + footerBtn + '</footer>';
    },

    _attachCardHandlers: function (s) {
      var card = document.getElementById('report-card-' + s.id);
      if (!card) return;

      // ✨ AI 補助ボタン
      var aiBtn = card.querySelector('.btn-ai-assist');
      if (aiBtn) {
        aiBtn.addEventListener('click', function () {
          AiAssistModal.open(s);
        });
      }

      // 追加ボタン
      card.querySelectorAll('.row-add').forEach(function (el) {
        el.addEventListener('click', function () {
          ReportView._openInlineAdd(s, el.dataset.section);
        });
      });

      // メール下書きボタン
      var draftBtn = card.querySelector('[data-action="draft"]');
      if (draftBtn) {
        draftBtn.addEventListener('click', function () {
          MailModal.open(s);
        });
      }

      // 再送ボタン
      var resendBtn = card.querySelector('[data-action="resend"]');
      if (resendBtn) {
        resendBtn.addEventListener('click', function () {
          MailModal.openResend(s);
        });
      }

      // Issue 6: 「× 削除」ボタン（前日行）
      card.querySelectorAll('.btn-del-row').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var staffId = btn.dataset.staffId;
          var seq = btn.dataset.seq;
          ReportView._deleteRow(staffId, seq, 'prev');
        });
      });

      // 「× 削除」ボタン（本日行）
      card.querySelectorAll('.btn-del-today-row').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var staffId = btn.dataset.staffId;
          var seq = btn.dataset.seq;
          ReportView._deleteRow(staffId, seq, 'today');
        });
      });

      // Issue 6: 「📋 前日へコピー」ボタン（本日行）
      card.querySelectorAll('.btn-copy-prev').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var staffId = btn.dataset.staffId;
          var seq = btn.dataset.seq;
          ReportView._copyToPrev(staffId, seq);
        });
      });

      // 「↑ 本日へコピー」ボタン（前日行）
      card.querySelectorAll('.btn-copy-to-today-row').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var seq = parseInt(btn.getAttribute('data-seq'), 10);
          ReportView._copyToToday(s.id, seq);
        });
      });

      // Issue C: 継続/完了セレクト（前日行）
      card.querySelectorAll('.sel-continued').forEach(function (sel) {
        sel.addEventListener('change', function () {
          var staffId = sel.dataset.staffId;
          var seq = sel.dataset.seq;
          var val = sel.value === 'true';
          if (!Store.reports[staffId]) return;
          var rec = Store.reports[staffId].find(function (r) { return String(r.seq) === String(seq); });
          if (!rec) return;
          rec.continued = val;
          // FIX-A: 保存後に State を保持（再取得しない）
          SaveQueue.flushNow(rec);
        });
      });
    },

    // Issue 6: 行削除（section='prev' または 'today'）
    _deleteRow: function (staffId, seq, section) {
      if (!Store.reports[staffId]) return;

      // 1. 削除対象の行を先に特定（linkedScheduleId 取得のため）
      var target = Store.reports[staffId].find(function (r) {
        if (String(r.seq) !== String(seq)) return false;
        if (section === 'today') return r.section === 'today';
        return r.section === 'prev' || r.section === 'yesterday';
      });

      // 2. ローカル Store から該当行を除外
      Store.reports[staffId] = Store.reports[staffId].filter(function (r) {
        return r !== target;
      });
      ReportView.render();

      // 3. 業務報告のサーバ削除
      google.script.run
        .withFailureHandler(function (err) {
          toast('行削除のサーバ反映に失敗しました: ' + String(err.message || err), 'err');
        })
        .deleteDailyReportBySeq(staffId, Store.today, section, seq);

      // 4. linkedScheduleId があればガント側も削除（連動）
      if (target && target.linkedScheduleId) {
        var scheduleId = target.linkedScheduleId;
        Store.schedules = (Store.schedules || []).filter(function (s) {
          return s.id !== scheduleId;
        });
        GanttView.renderBars();
        google.script.run
          .withFailureHandler(function (err) {
            toast('ガント連動削除に失敗しました: ' + String(err.message || err), 'err');
          })
          .deleteSchedule(scheduleId);
      }
    },

    // Issue 6: 本日行を前日へコピー（元行は残す）
    _copyToPrev: function (staffId, seq) {
      if (!Store.reports[staffId]) return;
      var orig = Store.reports[staffId].find(function (r) { return String(r.seq) === String(seq); });
      if (!orig) return;

      // CRITICAL FIX: detail を Backend スキーマに合わせて設定
      var detailText = orig.detail || orig.note || orig.workTypeName || '';
      // Issue 6: 「引き続き対応」マーカーを既定で true に（コピー = 継続中の意思表示）
      var newRow = {
        staffId:     staffId,
        reportDate:  Store.today,
        section:     'prev',
        seq:         Date.now(),
        kobanCode:   orig.kobanCode   || '',
        workTypeId:  orig.workTypeId  || '',
        detail:      detailText,        // ★ Backend スキーマ準拠
        duration:    '',                // 前日報告では duration は不要（Issue 5）
        continued:   true,              // FIX-A/C: boolean で統一（Issue 5/6）
        periodStart: orig.periodStart || '',
        periodEnd:   orig.periodEnd   || '',
        // Store 表示用（前日までの日付ラベル）
        workTypeName: orig.workTypeName || detailText,
        note:        detailText,
        dateRange:   (Store.prevWorkingDate || '').slice(5).replace('-', '/') || Store.today.slice(5).replace('-', '/')
      };

      Store.reports[staffId].push(newRow);
      ReportView.render();
      // FIX-7: 即時保存
      SaveQueue.flushNow(newRow);
    },

    // 前日行を本日へコピー（元行は残す）
    _copyToToday: function (staffId, seq) {
      var reports = Store.reports[staffId] || [];
      var src = reports.find(function (r) {
        return Number(r.seq) === Number(seq) && (r.section === 'prev' || r.section === 'yesterday');
      });
      if (!src) return;
      // 同 staffId / today / 同じ koban + detail で重複チェック
      var dup = reports.find(function (r) {
        return r.section === 'today'
          && r.kobanCode === src.kobanCode
          && (r.detail || '') === (src.detail || '');
      });
      if (dup) return;
      var todaySeqs = reports.filter(function (r) { return r.section === 'today'; }).map(function (r) { return Number(r.seq) || 0; });
      var newSeq = Math.max(0, ...todaySeqs) + 1;
      var newRow = {
        id:          'dr_' + (window.crypto && crypto.randomUUID ? crypto.randomUUID().replace(/-/g, '').substring(0, 16) : Math.random().toString(36).substring(2, 18)),
        staffId:     staffId,
        reportDate:  Store.today,
        section:     'today',
        seq:         newSeq,
        kobanCode:   src.kobanCode  || '',
        workTypeId:  src.workTypeId || '',
        detail:      src.detail     || '',
        duration:    '',
        periodStart: Store.today,
        periodEnd:   Store.today,
        continued:   false
      };
      reports.push(newRow);
      Store.reports[staffId] = reports;
      ReportView.render();
      SaveQueue.flushNow(newRow);
    },

    // Issue 4: インライン追加フォームに期間フィールド追加
    _openInlineAdd: function (s, section) {
      var containerId = section === 'today' ? 'today-rows-' + s.id : 'prev-rows-' + s.id;
      var container = document.getElementById(containerId);
      if (!container) return;

      // 既存フォームがあれば除去（トグル動作）
      var existing = container.querySelector('.inline-add-form');
      if (existing) { existing.remove(); return; }

      var form = document.createElement('div');
      form.className = 'inline-add-form';
      form.style.cssText = 'display:flex; flex-direction:column; gap:8px; padding:10px 12px; background:var(--bg-soft); border-radius:6px; margin-top:6px;';

      // C: 工番検索コンボボックス（datalist パターン）
      var inlineDlId = 'koban-dl-' + s.id + '-' + section;
      var kobanDl = document.createElement('datalist');
      kobanDl.id = inlineDlId;
      kobanDl.innerHTML = '<option value="（一般作業）">（一般作業）</option>' +
        Store.kobanList.map(function (k) {
          var display = k['工番'] + (k['受注先'] ? '  ' + k['受注先'] : '') + (k['品名'] ? '  ' + k['品名'] : '');
          return '<option value="' + escAttr(display) + '"></option>';
        }).join('');

      var kobanSel = document.createElement('input');
      kobanSel.type = 'text';
      kobanSel.setAttribute('list', inlineDlId);
      kobanSel.placeholder = '工番を検索（番号・受注先・品名）...';
      kobanSel.autocomplete = 'off';
      kobanSel.setAttribute('aria-label', '工番検索');
      kobanSel.style.cssText = 'width:100%; box-sizing:border-box; font-size:var(--font-input); padding:6px 10px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); height:var(--input-height);';
      // kobanSel.value は「工番コード  受注先  品名」形式 → 保存時に先頭トークンを取り出す

      var kobanInfo = document.createElement('div');
      kobanInfo.style.cssText = 'font-size:11px; color:var(--txt-3); min-height:14px;';
      kobanSel.addEventListener('input', function () {
        var raw  = kobanSel.value.split(/\s+/)[0].trim();
        var code = normalizeKobanCode(raw);
        if (code === '（一般作業）') code = '';
        var m = code ? Store.kobanByCode(code) : null;
        if (m) {
          kobanInfo.textContent = '受注先: ' + (m['受注先'] || '—') + ' / 納入先: ' + (m['納入先'] || '—') + ' / ' + (m['品名'] || '');
        } else {
          kobanInfo.textContent = '';
        }
      });
      // blur 時に先頭トークンを正規化して反映（IME 入力中の干渉を避けるため input では行わない）
      kobanSel.addEventListener('blur', function () {
        var parts = String(kobanSel.value).split(/\s+/);
        if (parts.length > 0 && parts[0]) {
          parts[0] = normalizeKobanCode(parts[0]);
          kobanSel.value = parts.join(' ');
        }
      });

      // Issue 4: 期間 select（フリー入力対応）- 本日セクションのみ表示
      var durationRow = document.createElement('div');
      durationRow.style.cssText = 'display:flex; gap:6px; align-items:center;';

      var durationSel = document.createElement('select');
      durationSel.style.cssText = 'flex:0 0 auto; font-size:var(--font-input); padding:6px 10px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); height:var(--input-height); box-sizing:border-box;';
      durationSel.innerHTML = '<option value="">期間（任意）</option>' +
        DURATION_OPTIONS.map(function (d) {
          return '<option value="' + escAttr(d) + '">' + esc(d) + '</option>';
        }).join('') +
        '<option value="__custom__">自由入力…</option>';

      var durationCustom = document.createElement('input');
      durationCustom.type = 'text';
      durationCustom.placeholder = '例: 午前中';
      durationCustom.style.cssText = 'flex:1 1 auto; font-size:var(--font-input); padding:6px 10px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); height:var(--input-height); box-sizing:border-box; display:none;';

      durationSel.addEventListener('change', function () {
        durationCustom.style.display = (durationSel.value === '__custom__') ? '' : 'none';
        if (durationSel.value !== '__custom__') durationCustom.value = '';
      });

      durationRow.appendChild(durationSel);
      durationRow.appendChild(durationCustom);

      // Issue C: 前日セクションには「継続/完了」セレクト
      var continuedSel = null;
      if (section !== 'today') {
        continuedSel = document.createElement('select');
        continuedSel.style.cssText = 'font-size:var(--font-input); padding:6px 10px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); height:var(--input-height); box-sizing:border-box;';
        continuedSel.innerHTML = '<option value="false">完了</option><option value="true">継続</option>';
      }

      // 作業内容テキストエリア
      var textarea = document.createElement('textarea');
      textarea.placeholder = '作業内容（Shift+Enter で改行、Enter で保存）';
      textarea.maxLength = 500;
      textarea.rows = 3;
      textarea.style.cssText = 'width:100%; box-sizing:border-box; font-size:var(--font-report); padding:8px 10px; border:1px solid var(--line-2); border-radius:4px; background:var(--bg-panel); color:var(--txt-1); resize:vertical; min-width:0; line-height:1.6;';

      var counter = document.createElement('div');
      counter.className = 'char-counter';
      counter.textContent = '0 / 500';

      var btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex; gap:6px; justify-content:flex-end;';

      var saveBtn = document.createElement('button');
      saveBtn.textContent = '保存';
      saveBtn.className = 'btn-accent';
      saveBtn.style.cssText = 'padding:6px 14px; font-size:13px;';

      var cancelBtn = document.createElement('button');
      cancelBtn.textContent = 'キャンセル';
      cancelBtn.className = 'btn-secondary';
      cancelBtn.style.cssText = 'padding:6px 14px; font-size:13px;';

      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(saveBtn);
      form.appendChild(kobanDl);
      form.appendChild(kobanSel);
      form.appendChild(kobanInfo);
      // Issue C: today は duration、prev は continuedSel を表示
      if (section === 'today') {
        form.appendChild(durationRow);
      } else if (continuedSel) {
        form.appendChild(continuedSel);
      }
      form.appendChild(textarea);
      form.appendChild(counter);
      form.appendChild(btnRow);
      container.appendChild(form);
      kobanSel.focus();

      textarea.addEventListener('input', function () {
        var len = textarea.value.length;
        counter.textContent = len + ' / 500';
        counter.className = 'char-counter' + (len > 500 ? ' over' : '');
      });

      // FIX-7: 保存処理（即時 flush）
      function doSave() {
        if (form._saved) return;
        form._saved = true;
        // C: datalist input の value から工番コードを抽出（先頭トークン、正規化照合）
        var kobanRawVal = kobanSel.value.trim();
        var koban = '';
        if (kobanRawVal && kobanRawVal !== '（一般作業）') {
          var kobanToken = normalizeKobanCode(kobanRawVal.split(/\s+/)[0].trim());
          var kobanFound = Store.kobanList.find(function (k) {
            return normalizeKobanCode(k['工番']) === kobanToken;
          });
          koban = kobanFound ? kobanFound['工番'] : '';
        }
        var wtName = textarea.value.trim();
        if (!wtName) { toast('作業内容を入力してください', 'warn'); form._saved = false; return; }
        if (wtName.length > 500) { toast('作業内容は500文字以内にしてください', 'warn'); form._saved = false; return; }

        // Issue 4: duration の決定（today セクションのみ）
        var durVal = '';
        if (section === 'today') {
          durVal = durationSel.value;
          if (durVal === '__custom__') durVal = durationCustom.value.trim();
        }

        // Issue C: continued の決定（prev セクションのみ）
        var continuedVal = false;
        if (section !== 'today' && continuedSel) {
          continuedVal = (continuedSel.value === 'true');
        }

        // CRITICAL FIX: DailyReports スキーマの列名は 'detail'（'note' ではない）
        // workTypeName / note / dateRange はクライアント側表示用のみで永続化されない
        var record = {
          staffId:     s.id,
          reportDate:  Store.today,
          section:     section,
          seq:         Date.now(),
          kobanCode:   koban,
          detail:      wtName,             // ★ Backend スキーマ準拠
          duration:    durVal,
          continued:   continuedVal,       // Issue C: boolean で保存
          // 以下は Store ローカル表示用（Backend では objectToRow_ により無視される）
          workTypeName: wtName,
          note:        wtName,
          dateRange:   Store.today.slice(5).replace('-', '/')
        };

        if (!Store.reports[s.id]) Store.reports[s.id] = [];
        Store.reports[s.id].push(record);

        // Issue 8: duration が 2日以上の作業内容 → ガントに自動バー追加
        if (section === 'today') {
          ReportView._maybeAutoAddGantt(record, s.id);
        }

        ReportView.render();
        // FIX-7: 即時保存（debounce なし）
        SaveQueue.flushNow(record);
      }

      saveBtn.addEventListener('click', doSave);
      cancelBtn.addEventListener('click', function () { form.remove(); });

      // FIX-7: Enter で保存（Shift+Enter は改行）
      textarea.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          doSave();
        }
      });

      // FIX-7: blur で保存（フォームの外にフォーカスが移った場合）
      textarea.addEventListener('blur', function () {
        setTimeout(function () {
          if (form.contains(document.activeElement)) return;
          if (textarea.value.trim()) doSave();
          else form.remove();
        }, 150);
      });
    },

    // Issue 8: duration が複数日の作業内容をガントに自動追加
    _maybeAutoAddGantt: function (record, staffId) {
      var days = parseDurationDays(record.duration);
      if (days < 2) return; // 1日以内はガント追加しない

      var startDate = record.reportDate || Store.today;
      var endD = parseDate(startDate);
      endD.setDate(endD.getDate() + days - 1);
      var endDate = toYMD(endD);

      // 重複チェック: 同一 staffId / kobanCode / 重なる日付範囲
      var dup = Store.schedules.some(function (sch) {
        if (sch.staffId !== staffId) return false;
        if (sch.kobanCode !== (record.kobanCode || '')) return false;
        return sch.startDate <= endDate && sch.endDate >= startDate;
      });
      if (dup) return;

      var newId = 'sch_' + (window.crypto && crypto.randomUUID
        ? crypto.randomUUID().replace(/-/g, '').substring(0, 16)
        : Math.random().toString(36).substring(2, 18));

      var schRecord = {
        id:         newId,
        staffId:    staffId,
        startDate:  startDate,
        endDate:    endDate,
        kobanCode:  record.kobanCode  || '',
        workTypeId: record.workTypeId || '',
        note:       record.workTypeName || record.note || ''
      };

      Store.schedules.push(schRecord);
      GanttView.renderBars();

      // 元の日報レコードに linkedScheduleId を書き戻す（カスケード削除のため）
      record.linkedScheduleId = newId;
      var srcInStore = (Store.reports[staffId] || []).find(function (r) {
        return r === record || (r.id && record.id && r.id === record.id);
      });
      if (srcInStore) {
        srcInStore.linkedScheduleId = newId;
        SaveQueue.flushNow(srcInStore);
      } else {
        SaveQueue.flushNow(record);
      }

      google.script.run
        .withSuccessHandler(function (serverId) {
          if (serverId && serverId !== newId) {
            var ex = Store.schedules.find(function (s) { return s.id === newId; });
            if (ex) ex.id = serverId;

            if (srcInStore && srcInStore.linkedScheduleId === newId) {
              srcInStore.linkedScheduleId = serverId;
              SaveQueue.flushNow(srcInStore);
            } else if (record.linkedScheduleId === newId) {
              record.linkedScheduleId = serverId;
              SaveQueue.flushNow(record);
            }
          }
          GanttView.renderBars();
        })
        .withFailureHandler(function (err) {
          toast('ガント自動追加失敗: ' + String(err.message || err), 'warn');
          Store.schedules = Store.schedules.filter(function (s) { return s.id !== newId; });
          if (srcInStore && srcInStore.linkedScheduleId === newId) {
            srcInStore.linkedScheduleId = '';
            SaveQueue.flushNow(srcInStore);
          } else if (record.linkedScheduleId === newId) {
            record.linkedScheduleId = '';
            SaveQueue.flushNow(record);
          }
          GanttView.renderBars();
        })
        .createSchedule(schRecord);
    }
  };

  // ════════════════════════════════════════════════════════════════
  // J. SaveQueue（楽観的UI + 保存）
  // ════════════════════════════════════════════════════════════════

  /**
   * FIX-7: 保存問題の根本修正
   *
   * 問題の根本原因推定:
   *   1. debounce 800ms 中にユーザーがタブを閉じると保存されない
   *   2. beforeunload での同期 flush が未実装
   *   3. blur 時の遅延 (150ms) + debounce (800ms) で計 950ms のラグ
   *
   * 修正内容:
   *   - flushNow(): debounce なしで即時 upsertDailyReport 呼び出し
   *   - enqueue(): debounce を 300ms に短縮（連打でも確実に最終状態を保存）
   *   - beforeunload で pendingFlush を同期実行
   *   - withFailureHandler でエラーをトーストに表示
   */
  var SaveQueue = {
    _timers: {},
    _pending: {}, // key -> record（最新状態）

    // FIX-7: 即時保存（debounce なし）
    flushNow: function (record) {
      var key = record.staffId + '_' + record.section + '_' + record.seq;
      clearTimeout(this._timers[key]);
      delete this._pending[key];
      this._doSave(record);
    },

    // FIX-7: debounce 300ms（旧 800ms から短縮）
    enqueue: function (record) {
      var key = record.staffId + '_' + record.section + '_' + record.seq;
      this._pending[key] = record;
      clearTimeout(this._timers[key]);
      var self = this;
      this._timers[key] = setTimeout(function () {
        var r = self._pending[key];
        delete self._pending[key];
        if (r) self._doSave(r);
      }, 300); // FIX-7: 300ms
    },

    // FIX-7: 共通保存ロジック
    _doSave: function (record) {
      google.script.run
        .withSuccessHandler(function () {
          lsSave('reports_' + Store.today, Store.reports);
        })
        .withFailureHandler(function (err) {
          // FIX-7: エラーをトーストに表示（サイレント失敗を排除）
          var msg = String(err && (err.message || err) || '不明なエラー');
          toast('保存失敗: ' + msg + '（ローカルにバックアップ済み）', 'err');
          lsSave('reports_backup_' + Date.now(), record);
        })
        .upsertDailyReport(record);
    },

    // FIX-7: beforeunload で pending をすべて即時 flush
    flushAllPending: function () {
      var self = this;
      Object.keys(this._pending).forEach(function (key) {
        var r = self._pending[key];
        clearTimeout(self._timers[key]);
        delete self._pending[key];
        if (r) self._doSave(r);
      });
    }
  };

  // 注意: GAS HTMLService の制約により google.script.run は非同期コールバックベース。
  // beforeunload では同期処理しか保証されないため、ここでの flush は完全な保証ではない。
  // debounce 短縮 + flushNow() を主要保存パスで使うことが第一の防衛線で、
  // beforeunload は最後の保険として呼ぶ。
  window.addEventListener('beforeunload', function () {
    SaveQueue.flushAllPending();
  });

  // ════════════════════════════════════════════════════════════════
  // K. MailModal（メール送信モーダル）
  // ════════════════════════════════════════════════════════════════

  var MailModal = {
    _currentStaff: null,
    _isResend: false,
    _originalMailId: null,

    open: function (staff) {
      this._currentStaff = staff;
      this._isResend     = false;
      this._originalMailId = null;
      this._populate(staff);
      var mailModal = document.getElementById('mail-modal');
      mailModal.classList.add('open');
      trapFocus(mailModal);
    },

    openResend: function (staff) {
      var mq = (Store.mailLatest && Store.mailLatest[staff.id]) || null;
      var mailStatus = mq ? mq.status : 'idle';
      if (!mq) {
        toast('再送可能な依頼が見つかりません。', 'warn');
        return;
      }
      if (mailStatus === 'sent') {
        if (!confirm('既に送信済みです。本当に再送しますか？')) return;
      }
      this._currentStaff   = staff;
      this._isResend       = true;
      this._originalMailId = mq.id;
      this._populate(staff);
      var mailModalResend = document.getElementById('mail-modal');
      mailModalResend.classList.add('open');
      trapFocus(mailModalResend);
    },

    close: function () {
      document.getElementById('mail-modal').classList.remove('open');
      this._currentStaff = null;
    },

    _populate: function (staff) {
      var setId = function (id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };

      var avEl = document.getElementById('modal-staff-avatar');
      if (avEl) {
        var staffIdx = Store.staff.findIndex(function (s) { return s.id === staff.id; });
        avEl.className = 'w-7 h-7 rounded-full grid place-items-center text-[10.5px] font-semibold text-white av-' + ((staffIdx % 7) + 1);
        avEl.textContent = staff.name ? staff.name.charAt(0) : '?';
      }
      setId('modal-staff-name',  staff.name || '');
      setId('modal-staff-email', staff.email || '');

      var others = Store.staff.filter(function (s) { return s.id !== staff.id && s.email; });
      var toCount = document.getElementById('modal-to-count');
      if (toCount) toCount.textContent = others.length + '名';
      var toDiv = document.getElementById('modal-to-addresses');
      if (toDiv) toDiv.innerHTML = others.map(function (s) { return '<div>' + esc(s.email) + '</div>'; }).join('');

      var badge = document.getElementById('modal-email-match-badge');
      if (badge) {
        var matched = !!staff.email;
        badge.textContent = matched ? '✓ 一致確認OK' : '⚠ メール未設定';
        badge.className   = 'badge ' + (matched ? 'badge-sent' : 'badge-failed');
      }
      var subBtn = document.getElementById('mail-modal-submit');
      if (subBtn) {
        subBtn.disabled = !staff.email;
        subBtn.style.opacity = staff.email ? '' : '0.5';
      }

      // プレビュー（GAS API 優先、フォールバックはクライアント実装）
      this._updatePreview(staff);
    },

    _buildItems: function (reps) {
      return reps.map(function (r) {
        var koban  = r.kobanCode || '';
        var master = koban ? Store.kobanByCode(koban) : null;
        var customer    = master ? (master['受注先']  || '') : '';
        var productName = master ? (master['品名']    || '') : '';
        var wt = r.workTypeId
          ? Store.workTypes.find(function (w) { return w.id === r.workTypeId; })
          : null;
        var workType = wt ? wt.name : (r.workTypeName || '');
        var ymd2slash = function (s) { return String(s || '').replace(/-/g, '/'); };
        var ps = ymd2slash(r.periodStart || r.reportDate || Store.today);
        var pe = ymd2slash(r.periodEnd   || r.reportDate || Store.today);
        return {
          periodStart: ps,
          periodEnd:   pe,
          kobanCode:   koban,
          customer:    customer,
          productName: productName,
          workType:    workType || '',
          detail:      r.detail || r.note || '',
          duration:    r.duration || '',
          continued:   r.continued === true || r.continued === 'true' || r.continued === 'TRUE'
        };
      });
    },

    // GAS 側 previewMailBody API のみを使う。
    // マイナス思考: フォールバック実装は本実装と整合せず、削除。
    // GAS が落ちている場合は enqueue 自体が失敗するため、プレビューも空で問題ない。
    // 挨拶は GAS 側 buildMailBody で「関係各位」固定のためフロントからは送らない。
    _buildMailBodyPreviewAsync: function (staff) {
      var self = this;

      var sigName  = staff.signatureName  || staff.name  || '';
      var sigEmail = staff.signatureEmail || staff.email || '';

      var reports = Store.reports[staff.id] || [];
      var today   = Store.today;
      var rdSlash = String(today).replace(/-/g, '/');

      var todayReps = reports.filter(function (r) { return r.reportDate === today && r.section === 'today'; });
      var prevReps  = reports.filter(function (r) { return r.section === 'prev' || r.section === 'yesterday'; });

      var bodyVars = {
        staffName:      staff.name || '',
        reportDate:     rdSlash,
        todayItems:     self._buildItems(todayReps),
        yesterdayItems: self._buildItems(prevReps),
        signatureName:  sigName,
        signatureEmail: sigEmail
      };

      return gasPromise('previewMailBody', bodyVars)
        .then(function (res) {
          if (res && res.success && res.body) return res.body;
          return '（プレビュー生成に失敗しました）';
        })
        .catch(function (err) {
          return '（プレビュー生成に失敗しました: ' + String((err && err.message) || err) + '）';
        });
    },

    // プレビュー要素を非同期更新するヘルパー
    _updatePreview: function (staff) {
      var preview = document.getElementById('modal-body-preview');
      if (!preview) return;
      this._buildMailBodyPreviewAsync(staff).then(function (body) {
        preview.textContent = body;
      });
    },

    submit: function () {
      var staff = this._currentStaff;
      if (!staff) return;

      if (!staff.email) {
        toast('このスタッフのメールアドレスが未設定です。Staff シートで設定してください。', 'err');
        return;
      }

      var modeEl = document.querySelector('input[name="mail-mode"]:checked');
      var mode   = modeEl ? modeEl.value : 'draft';
