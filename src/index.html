<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>技術部タスク管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<?!= include('styles') ?>
</head>
<body class="min-h-screen">

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ═══════════════ MAIL MODAL ═══════════════ -->
<div id="mail-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="max-w-2xl w-full mx-4 modal-panel shadow-deep">
    <div class="modal-header">
      <span>メール送信内容の確認</span>
      <button id="mail-modal-close" class="modal-close-btn">×</button>
    </div>

    <div class="p-5 space-y-4 text-sm">
      <div class="grid grid-cols-[140px_1fr] gap-y-3 gap-x-4 items-center">
        <span class="label-sm">作業スタッフ</span>
        <div class="flex items-center gap-2">
          <div id="modal-staff-avatar" class="w-7 h-7 rounded-full grid place-items-center text-[10.5px] font-semibold text-white av-1"></div>
          <span id="modal-staff-name" class="font-semibold"></span>
        </div>

        <span class="label-sm">登録メールアドレス</span>
        <span class="flex items-center gap-2">
          <span id="modal-staff-email" class="mono text-[12.5px]"></span>
          <span id="modal-email-match-badge" class="badge badge-sent">✓ 一致確認OK</span>
        </span>
      </div>

      <div>
        <div class="label-sm mb-1.5">送付先 <span id="modal-to-count" class="mono"></span></div>
        <div id="modal-to-addresses" class="text-[11.5px] mono px-3 py-2 rounded-md space-y-0.5" style="background:var(--bg-soft); color:var(--txt-2); border:1px solid var(--line)"></div>
      </div>


      <div>
        <div class="label-sm mb-1.5">送信モード</div>
        <div class="grid grid-cols-2 gap-2">
          <label id="modal-mode-draft-label" class="px-3 py-2.5 rounded-md cursor-pointer flex items-start gap-2" style="border:1.5px solid var(--accent); background:var(--accent-soft)">
            <input type="radio" name="mail-mode" value="draft" checked class="mt-0.5">
            <div>
              <div class="text-[13px] font-semibold" style="color:var(--accent-2)">下書きを作成</div>
              <div class="text-[11px] mt-0.5" style="color:var(--txt-3)">推奨 · 既定</div>
            </div>
          </label>
          <label id="modal-mode-send-label" class="px-3 py-2.5 rounded-md cursor-pointer flex items-start gap-2" style="border:1px solid var(--line-2); background: var(--bg-panel)">
            <input type="radio" name="mail-mode" value="send" class="mt-0.5">
            <div>
              <div class="text-[13px] font-semibold">直接送信する</div>
              <div class="text-[11px] mt-0.5" style="color:var(--txt-3)">確認なしで送信</div>
            </div>
          </label>
        </div>
      </div>

      <div>
        <div class="label-sm mb-1.5">本文プレビュー</div>
        <div id="modal-body-preview" class="text-[11.5px] p-3.5 rounded-md mono leading-relaxed" style="background:var(--bg-soft); color:var(--txt-1); max-height:200px; overflow:auto; border:1px solid var(--line); white-space: pre-wrap"></div>
      </div>
    </div>

    <div class="px-5 py-3 flex items-center justify-end gap-2" style="border-top:1px solid var(--line); background:var(--bg-soft)">
      <button id="mail-modal-cancel" class="btn-secondary">キャンセル</button>
      <button id="mail-modal-submit" class="btn-primary">依頼を登録する</button>
    </div>
  </div>
</div>

<!-- ═══════════════ AI 補助モーダル（カード単位） ═══════════════ -->
<div id="ai-assist-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div style="width:100%;max-width:560px" class="mx-4 modal-panel shadow-deep">
    <div class="modal-header">
      <span id="ai-assist-modal-title">AI 補助 — <span id="ai-assist-staff-name"></span></span>
      <button id="ai-assist-modal-close" class="modal-close-btn">×</button>
    </div>
    <div class="p-4 space-y-3 text-sm">
      <div>
        <label class="label-sm" for="ai-assist-text">自由文</label>
        <textarea id="ai-assist-text" rows="3"
          placeholder="例: 明日 LW23012 構想図 3時間"
          style="margin-top:6px;width:100%;box-sizing:border-box;font-size:var(--font-input);padding:8px 10px;border:1px solid var(--line-2);border-radius:6px;background:var(--bg-soft);color:var(--txt-1);resize:vertical;line-height:1.6;"></textarea>
      </div>
      <div class="flex justify-end">
        <button id="ai-assist-parse-btn" class="btn-accent" style="padding:6px 16px;font-size:13px;">解析</button>
      </div>
      <div id="ai-assist-preview" style="display:none;">
        <div class="label-sm mb-2">解析結果</div>
        <div id="ai-assist-entries" class="space-y-2 text-[12.5px]"></div>
        <div class="flex gap-2 mt-3 justify-end flex-wrap">
          <button id="ai-assist-add-today" class="btn-secondary" style="padding:6px 14px;font-size:12.5px;">本日に追加</button>
          <button id="ai-assist-add-prev"  class="btn-secondary" style="padding:6px 14px;font-size:12.5px;">前日に追加</button>
          <button id="ai-assist-add-gantt" class="btn-secondary" style="padding:6px 14px;font-size:12.5px;">ガントに追加</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ AI モードモーダル（全員対象） ═══════════════ -->
<div id="ai-mode-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div style="width:100%;max-width:640px" class="mx-4 modal-panel shadow-deep">
    <div class="modal-header">
      <span>AI モード</span>
      <button id="ai-mode-modal-close" class="modal-close-btn">×</button>
    </div>
    <div class="p-4 space-y-3 text-sm">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label-sm" for="ai-mode-staff">スタッフ</label>
          <select id="ai-mode-staff" class="koban-input" style="margin-top:4px;"></select>
        </div>
        <div>
          <label class="label-sm" for="ai-mode-date">基準日</label>
          <input id="ai-mode-date" type="date" class="koban-input" style="margin-top:4px;">
        </div>
      </div>
      <div>
        <label class="label-sm" for="ai-mode-text">自由文（複数行可）</label>
        <textarea id="ai-mode-text" rows="5"
          placeholder="例:&#10;明日 LW23012 構想図 1日&#10;明後日 LW24001 検図 半日&#10;来週月曜 出張"
          style="margin-top:6px;width:100%;box-sizing:border-box;font-size:var(--font-input);padding:8px 10px;border:1px solid var(--line-2);border-radius:6px;background:var(--bg-soft);color:var(--txt-1);resize:vertical;line-height:1.6;"></textarea>
      </div>
      <div class="flex justify-end">
        <button id="ai-mode-parse-btn" class="btn-accent" style="padding:6px 16px;font-size:13px;">AI で解析</button>
      </div>
      <div id="ai-mode-preview" style="display:none;">
        <div class="label-sm mb-2">解析結果プレビュー</div>
        <div id="ai-mode-entries" class="space-y-2 text-[12.5px]"></div>
        <div class="flex gap-2 mt-3 justify-end flex-wrap">
          <button id="ai-mode-add-gantt"  class="btn-secondary" style="padding:6px 14px;font-size:12.5px;">ガントに追加</button>
          <button id="ai-mode-add-report" class="btn-secondary" style="padding:6px 14px;font-size:12.5px;">業務報告に追加</button>
          <button id="ai-mode-cancel"     class="btn-secondary" style="padding:6px 14px;font-size:12.5px;">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ GANTT EDIT MODAL ═══════════════ -->
<div id="gantt-edit-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div style="width:100%;max-width:640px" class="mx-4 modal-panel shadow-deep">
    <div class="modal-header">
      <span id="gantt-modal-title">スケジュール編集</span>
      <button id="gantt-modal-close" class="modal-close-btn">×</button>
    </div>
    <div class="p-5 space-y-4 text-sm">
      <input type="hidden" id="ge-id">
      <input type="hidden" id="ge-staff-id">

      <div class="grid grid-cols-[120px_1fr] gap-y-5 gap-x-4 items-center">
        <label class="label-sm" for="ge-koban-input">工番</label>
        <div>
          <!-- C: datalist パターンで検索可能コンボボックス -->
          <datalist id="ge-koban-datalist">
            <option value="（一般作業）">（一般作業）</option>
          </datalist>
          <input
            id="ge-koban-input"
            type="text"
            list="ge-koban-datalist"
            class="koban-search-input"
            placeholder="工番を検索（番号・受注先・品名）..."
            autocomplete="off"
            aria-label="工番検索">
          <div id="ge-koban-info" class="text-[11px] mt-1.5" style="color:var(--txt-3)"></div>
        </div>

        <label class="label-sm" for="ge-worktype">作業内容</label>
        <select id="ge-worktype" class="gantt-modal-input">
          <option value="">選択…</option>
        </select>

        <label class="label-sm" for="ge-start">開始日</label>
        <input id="ge-start" type="date" class="gantt-modal-input">

        <label class="label-sm" for="ge-end">終了日</label>
        <input id="ge-end" type="date" class="gantt-modal-input">

        <label class="label-sm" for="ge-note">メモ</label>
        <input id="ge-note" type="text" class="gantt-modal-input" placeholder="任意">
      </div>
    </div>
    <div class="px-5 py-3 flex items-center justify-between gap-2" style="border-top:1px solid var(--line); background:var(--bg-soft)">
      <button id="ge-delete" class="btn-secondary" style="font-size:13px; color:var(--err); border-color:rgba(161,59,42,.3); display:none;">削除</button>
      <div class="flex gap-2 ml-auto">
        <button id="ge-cancel" class="btn-secondary">キャンセル</button>
        <button id="ge-save" class="btn-primary">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div class="app-layout">

  <!-- ── コンパクトヘッダ 1行 ── -->
  <header class="app-header">
    <div class="flex items-center gap-3">
      <span class="font-semibold text-sm">技術部タスク管理</span>
      <span id="page-date-eyebrow" class="text-[12px] mono" style="color:var(--txt-3)">— 読み込み中 —</span>
    </div>
    <div class="flex items-center gap-2 text-xs" style="color:var(--txt-3)">
      <!-- マイナス思考: ハードコードの user 表示は情報価値なく誤情報源になり得るため削除 -->
      <button id="ai-mode-open-btn" style="font-size:11.5px;padding:3px 8px;border:1px solid var(--line-2);border-radius:5px;background:var(--bg-panel);color:var(--txt-2);cursor:pointer;">🪄 AI モード</button>
      <span id="heartbeat-dot" class="heartbeat"></span>
      <span>EXEエージェント</span>
      <span id="heartbeat-time" class="mono" style="font-size:10px">— 確認中</span>
    </div>
  </header>

  <!-- ── メインコンテンツ ── -->
  <main class="app-main">

    <!-- ── ガントチャート ── -->
    <!-- FIX-1: min-width:0 を親に追加し、ガント追加時にレイアウトが崩れないようにする -->
    <section class="gantt-section" style="min-width:0">
      <div class="section-header">
        <span class="section-label">ガントチャート</span>
      </div>

      <div class="gantt-wrap shadow-soft">
        <div class="gantt-scroll" id="gantt-scroll-container">
          <div class="gantt-table" id="gantt-table">
            <div class="gantt-staff-col" id="gantt-staff-col">
              <div class="staff-cell header" style="height:64px">スタッフ</div>
            </div>
            <div class="gantt-days" id="gantt-days-grid">
              <!-- JS で描画 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 操作ヒントは削除（業務に支障なし・装飾的）。マイナス思考: 1日0回読まれるテキストは不要 -->
    </section>

    <!-- ── 日報カード ── -->
    <section class="reports-section">
      <div class="section-header">
        <!-- マイナス思考: 「対象日」表示はヘッダ日付と重複するため削除 -->
        <span class="section-label">業務報告</span>
      </div>

      <!-- Issue 2: flex column で全7名を縦1列に表示 -->
      <div id="report-cards-grid" class="report-grid">
        <!-- JS で描画 -->
        <div class="panel rounded-xl overflow-hidden shadow-soft" style="min-height:160px">
          <div class="px-4 py-3 flex items-center gap-2.5">
            <div class="skeleton w-8 h-8 rounded-full flex-shrink-0"></div>
            <div class="space-y-1.5 flex-1">
              <div class="skeleton h-3 w-24 rounded"></div>
              <div class="skeleton h-2.5 w-32 rounded"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>
</div>

<?!= include('scripts') ?>
</body>
</html>
